<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공과금 관리 — 종로도서관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0a1929;
  --elec:#1976d2;--elec-l:#bbdefb;--elec-bg:#e3f2fd;
  --gas:#ef6c00;--gas-l:#ffe0b2;--gas-bg:#fff3e0;
  --water:#00897b;--water-l:#b2dfdb;--water-bg:#e0f2f1;
  --bg:#f0f2f5;--surface:#fff;
  --txt:#1a2a3a;--txt-m:#5a6a7a;--txt-l:#94a4b4;
  --border:#e0e4ea;--shadow:0 2px 8px rgba(0,0,0,.05);
  --green:#2e7d32;--red:#c62828;--yellow:#f9a825;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt)}

.hdr{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:12px;color:#fff}
.hdr-left img{height:22px;filter:brightness(10)}
.hdr-title{font-size:18px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-right button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px}
.hdr-right button:hover{background:rgba(255,255,255,.2)}
.hdr-right span{color:#fff;font-size:16px;font-weight:700;min-width:56px;text-align:center}

.wrap{max-width:1100px;margin:0 auto;padding:16px}

/* ── 탭 ── */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:.15s;border:2px solid transparent;background:var(--surface)}
.tab:hover{transform:translateY(-1px)}
.tab[data-t="전기"]{color:var(--elec)}.tab[data-t="전기"].on{background:var(--elec-bg);border-color:var(--elec)}
.tab[data-t="가스"]{color:var(--gas)}.tab[data-t="가스"].on{background:var(--gas-bg);border-color:var(--gas)}
.tab[data-t="수도"]{color:var(--water)}.tab[data-t="수도"].on{background:var(--water-bg);border-color:var(--water)}

/* ── 요약 카드 ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.s-card{background:var(--surface);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.s-label{font-size:12px;color:var(--txt-l);font-weight:500;margin-bottom:6px}
.s-value{font-size:22px;font-weight:900}
.s-sub{font-size:11px;margin-top:4px}
.s-up{color:var(--red)}.s-down{color:var(--green)}.s-neutral{color:var(--txt-l)}

/* ── 메인 그리드 ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border-radius:10px;padding:20px;box-shadow:var(--shadow)}
.card-full{grid-column:1/-1}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* ── 데이터 테이블 (직접 편집) ── */
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{padding:8px 4px;font-size:11px;font-weight:600;color:var(--txt-l);text-align:center;border-bottom:2px solid var(--border);background:var(--bg)}
.dtable td{padding:0;text-align:center;border-bottom:1px solid #f0f0f0;height:36px}
.dtable .rlabel{font-size:11px;font-weight:700;color:var(--txt-m);background:var(--bg);text-align:left;padding:8px 8px;white-space:nowrap}
.dtable input{width:100%;height:100%;border:none;text-align:right;font-size:13px;font-family:inherit;padding:6px 8px;background:transparent;outline:none;color:var(--txt)}
.dtable input:focus{background:#e8f0fe;font-weight:700}
.dtable input::placeholder{color:var(--txt-l);font-style:italic}
.dtable .total-cell{font-weight:900;padding:8px 8px;background:var(--bg);text-align:right}
.dtable .budget-row input{color:var(--elec)}
.dtable .budget-row td{background:rgba(25,118,210,.02)}

/* 예산 상태 색상 */
.budget-ok{background:var(--elec-bg) !important}
.budget-warn{background:#fff8e1 !important}
.budget-over{background:#ffebee !important}
.budget-bar{height:4px;border-radius:2px;margin-top:4px;background:var(--border)}
.budget-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── 차트 ── */
.chart-wrap{position:relative;height:220px}

/* ── AI 패널 ── */
.ai-btn{padding:10px 18px;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:pointer;font-family:inherit;transition:.15s;background:var(--navy);color:#fff}
.ai-btn:hover{opacity:.85}
.ai-result{margin-top:14px;font-size:13px;line-height:1.9;color:var(--txt-m);white-space:pre-line;background:var(--bg);border-radius:8px;padding:14px}

/* ── 업로드 ── */
.upload-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.upload-btn{padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px;border:1.5px dashed var(--border);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--txt-m);transition:.15s}
.upload-btn:hover{border-color:var(--elec);color:var(--elec);background:var(--elec-bg)}
.upload-status{font-size:12px;color:var(--txt-l)}

/* ── 예산 게이지 ── */
.gauge{margin-top:12px}
.gauge-bar{height:20px;background:var(--border);border-radius:10px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:10px;transition:width .5s}
.gauge-fill.ok{background:linear-gradient(90deg,var(--green),#66bb6a)}
.gauge-fill.warn{background:linear-gradient(90deg,var(--yellow),#fdd835)}
.gauge-fill.over{background:linear-gradient(90deg,var(--red),#ef5350)}
.gauge-label{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--txt-m)}
.gauge-bar-m{display:flex;height:28px;border-radius:8px;overflow:hidden;background:var(--border);gap:1px}
.seg{transition:all .3s;position:relative}
.seg-actual{background:var(--green);opacity:.8}
.seg-predict{background:var(--green);opacity:.25}
.seg-over{background:var(--red) !important}
.seg:hover{opacity:1;transform:scaleY(1.15)}
.gauge-months{display:flex;margin-top:2px}
.gauge-months span{text-align:center;font-size:9px;color:var(--txt-l);font-weight:500}
.ok{--ok:var(--green)}.warn{--warn:var(--yellow)}.over{--over:var(--red)}

@media(max-width:768px){
  .summary{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .dtable{font-size:11px}
  .dtable input{font-size:11px;padding:4px 3px}
  .s-value{font-size:18px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt="">
    <span class="hdr-title">공과금 관리</span>
  </div>
  <div class="hdr-right">
    <button onclick="chgYear(-1)">&lt;</button>
    <span id="yLabel">2025년</span>
    <button onclick="chgYear(1)">&gt;</button>
  </div>
</div>

<div class="wrap">

  <div class="tabs">
    <div class="tab on" data-t="전기" onclick="setTab('전기')">&#9889; 전기</div>
    <div class="tab" data-t="가스" onclick="setTab('가스')">&#128293; 가스</div>
    <div class="tab" data-t="수도" onclick="setTab('수도')">&#128167; 수도</div>
  </div>

  <!-- 요약 -->
  <div class="summary" id="summary"></div>

  <!-- 예산 게이지 -->
  <div class="card" id="gaugeCard" style="margin-bottom:16px">
    <div class="card-title">예산 집행 현황</div>
    <div class="gauge" id="gauge"></div>
  </div>

  <!-- 업로드 + 테이블 -->
  <div class="card card-full" style="margin-bottom:16px">
    <div class="card-title">
      <span>월별 데이터</span>
      <div class="upload-bar">
        <label class="upload-btn" for="fileIn">&#128247; 고지서 업로드</label>
        <input type="file" id="fileIn" accept="image/*,.pdf" multiple onchange="handleUpload(this.files)" style="display:none">
        <span class="upload-status" id="uploadStatus"></span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="dtable" id="dataTable"></table>
    </div>
  </div>

  <div class="grid">
    <!-- 차트 -->
    <div class="card">
      <div class="card-title">사용량 · 기온 비교</div>
      <div class="chart-wrap"><canvas id="chartUsage"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">요금 추이 (전년 비교)</div>
      <div class="chart-wrap"><canvas id="chartCost"></canvas></div>
    </div>

    <!-- AI -->
    <div class="card card-full">
      <div class="card-title">
        <span>&#129302; AI 분석</span>
        <button class="ai-btn" onclick="runAI()">분석 실행</button>
      </div>
      <div class="ai-result" id="aiResult" style="display:none"></div>
    </div>
  </div>

</div>

<script>
var WORKER = 'https://bill-worker.hdh1231.workers.dev';
var Y = new Date().getFullYear();
var T = '전기';
var charts = {};

var $ = function(id){return document.getElementById(id)};
var UNITS = {'전기':'kWh','가스':'m³','수도':'m³'};
var COLORS = {
  '전기':{main:'#1976d2',light:'#90caf9',bg:'#e3f2fd'},
  '가스':{main:'#ef6c00',light:'#ffcc80',bg:'#fff3e0'},
  '수도':{main:'#00897b',light:'#80cbc4',bg:'#e0f2f1'}
};

// 데이터 저장소
var D = {
  '전기':{2023:{},2024:{},2025:{},budget:{}},
  '가스':{2023:{},2024:{},2025:{},budget:{}},
  '수도':{2023:{},2024:{},2025:{},budget:{}}
};

// 기온 데이터
var W = {
  2024:{1:-2.1,2:0.8,3:7.2,4:13.5,5:18.9,6:23.4,7:26.8,8:27.2,9:22.1,10:15.3,11:7.8,12:0.2},
  2025:{1:-3.5,2:-0.2,3:6.8}
};

// 샘플 데이터
(function loadSample(){
  var s = {
    '전기':{
      2024:{1:{u:12400,a:1860000},2:{u:11800,a:1770000},3:{u:9600,a:1440000},4:{u:7200,a:1080000},5:{u:6800,a:1020000},6:{u:8900,a:1335000},7:{u:14200,a:2130000},8:{u:15600,a:2340000},9:{u:11200,a:1680000},10:{u:7800,a:1170000},11:{u:8400,a:1260000},12:{u:11600,a:1740000}},
      2025:{1:{u:13100,a:1965000},2:{u:12200,a:1830000},3:{u:9900,a:1485000}},
      budget:{2024:18000000,2025:19000000}
    },
    '가스':{
      2024:{1:{u:4200,a:3780000},2:{u:3800,a:3420000},3:{u:2600,a:2340000},4:{u:1200,a:1080000},5:{u:400,a:360000},6:{u:200,a:180000},7:{u:150,a:135000},8:{u:120,a:108000},9:{u:300,a:270000},10:{u:1400,a:1260000},11:{u:2800,a:2520000},12:{u:3900,a:3510000}},
      2025:{1:{u:4500,a:4050000},2:{u:4000,a:3600000},3:{u:2800,a:2520000}},
      budget:{2024:20000000,2025:21000000}
    },
    '수도':{
      2024:{1:{u:320,a:480000},2:{u:310,a:465000},3:{u:340,a:510000},4:{u:360,a:540000},5:{u:380,a:570000},6:{u:420,a:630000},7:{u:480,a:720000},8:{u:510,a:765000},9:{u:440,a:660000},10:{u:370,a:555000},11:{u:330,a:495000},12:{u:320,a:480000}},
      2025:{1:{u:330,a:495000},2:{u:320,a:480000},3:{u:350,a:525000}},
      budget:{2024:7500000,2025:8000000}
    }
  };
  for(var t in s){
    for(var y in s[t]){
      if(y==='budget'){D[t].budget=s[t].budget;continue}
      D[t][y]={};
      for(var m in s[t][y]) D[t][y][m]=s[t][y][m];
    }
  }
})();

function setTab(t){T=t;document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('on',e.dataset.t===t)});render()}
function chgYear(d){Y+=d;$('yLabel').textContent=Y+'년';render()}

function render(){
  renderSummary();
  renderGauge();
  renderTable();
  renderCharts();
}

// ── 요약 카드 ──
function renderSummary(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var now=new Date();var cm=Y===now.getFullYear()?now.getMonth()+1:12;

  var totalA=0,totalU=0,prevA=0,cnt=0;
  for(var m=1;m<=12;m++){
    if(data[m]){totalA+=data[m].a||0;totalU+=data[m].u||0;cnt++}
    if(prev[m]&&m<=cnt) prevA+=prev[m].a||0;
  }
  var change=prevA>0?Math.round((totalA-prevA)/prevA*100):0;
  var avgA=cnt>0?Math.round(totalA/cnt):0;
  var budget=D[T].budget[Y]||0;
  var remain=budget-totalA;

  var col=COLORS[T].main;
  $('summary').innerHTML=
    card('누적 사용요금',won(totalA),(change>0?'+':'')+change+'% 전년비',change>0?'s-up':change<0?'s-down':'s-neutral',col)
    +card('월 평균',won(avgA),'('+cnt+'개월 기준)','s-neutral',col)
    +card('연간 예산',won(budget),budget?'잔액 '+won(remain):'미설정','s-neutral',col)
    +card('사용량 합계',fnum(totalU)+' '+UNITS[T],cnt+'개월 집계','s-neutral',col);

  function card(label,value,sub,cls,color){
    return '<div class="s-card"><div class="s-label">'+label+'</div><div class="s-value" style="color:'+color+'">'+value+'</div><div class="s-sub '+cls+'">'+sub+'</div></div>';
  }
}

// ── 예산 게이지 (월별 구간) ──
function renderGauge(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var budget=D[T].budget[Y]||0;
  if(!budget){$('gauge').innerHTML='<div style="text-align:center;color:var(--txt-l);font-size:13px;padding:8px">아래 표에서 연간 예산을 입력하세요</div>';return}

  // 월별 누적 계산
  var cumul=0,predictCumul=0;
  var segments='';
  var now=new Date();var cm=Y===now.getFullYear()?now.getMonth()+1:13;
  var monthLabels='';

  for(var m=1;m<=12;m++){
    var amt=0,isPredicted=false;
    if(data[m]){amt=data[m].a||0}
    else if(prev[m]){amt=Math.round((prev[m].a||0)*1.03);isPredicted=true}
    predictCumul+=amt;
    if(!isPredicted) cumul+=amt;

    var w=100/12;
    var cls=isPredicted?'seg-predict':'seg-actual';
    // 누적이 예산 넘으면 빨간색
    if(predictCumul>budget) cls+=' seg-over';
    segments+='<div class="seg '+cls+'" style="width:'+w+'%" title="'+m+'월: '+won(amt)+'"></div>';
    monthLabels+='<span style="width:'+w+'%">'+m+'</span>';
  }

  var pctSpent=Math.round(cumul/budget*100);
  var pctPredict=Math.round(predictCumul/budget*100);
  var statusCls=pctPredict<=85?'ok':pctPredict<=100?'warn':'over';

  $('gauge').innerHTML=
    '<div class="gauge-bar-m">'+segments+'</div>'
    +'<div class="gauge-months">'+monthLabels+'</div>'
    +'<div class="gauge-label">'
    +'<span><b style="color:var(--'+statusCls+')">'+pctSpent+'%</b> 집행 ('+won(cumul)+')</span>'
    +'<span style="color:var(--txt-l)">예상 '+pctPredict+'% ('+won(predictCumul)+')</span>'
    +'<span>예산 '+won(budget)+'</span></div>';
}

// ── 데이터 테이블 ──
function renderTable(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var unit=UNITS[T];
  var now=new Date();var cm=Y===now.getFullYear()?now.getMonth()+1:12;
  var budget=D[T].budget[Y]||'';

  var h='<thead><tr><th></th>';
  for(var m=1;m<=12;m++) h+='<th>'+m+'월</th>';
  h+='<th>합계</th></tr></thead><tbody>';

  // 사용량 행
  var tU=0;
  h+='<tr><td class="rlabel">사용량<br>('+unit+')</td>';
  for(m=1;m<=12;m++){
    var v=data[m]?data[m].u:'';
    if(v) tU+=v;
    var bg=data[m]?'':'';
    h+='<td><input type="number" value="'+(v||'')+'" placeholder="-" onchange="setVal('+m+',\'u\',this.value)"></td>';
  }
  h+='<td class="total-cell">'+fnum(tU)+'</td></tr>';

  // 요금 행
  var tA=0;
  h+='<tr><td class="rlabel">요금<br>(원)</td>';
  for(m=1;m<=12;m++){
    var v=data[m]?data[m].a:'';
    if(v) tA+=v;
    h+='<td><input type="number" value="'+(v||'')+'" placeholder="-" onchange="setVal('+m+',\'a\',this.value)"></td>';
  }
  h+='<td class="total-cell">'+won(tA)+'</td></tr>';

  // 전년 요금 행 (참고)
  var tP=0;
  h+='<tr style="opacity:.5"><td class="rlabel">전년요금</td>';
  for(m=1;m<=12;m++){
    var pv=prev[m]?prev[m].a:0;
    tP+=pv;
    h+='<td style="padding:6px 4px;font-size:11px;color:var(--txt-l);text-align:right">'+(pv?won(pv):'-')+'</td>';
  }
  h+='<td class="total-cell" style="font-size:11px">'+won(tP)+'</td></tr>';

  // 예산 행
  h+='<tr class="budget-row"><td class="rlabel" style="color:var(--elec)">연간예산</td>';
  h+='<td colspan="12" style="text-align:left;padding:6px 8px"><input type="number" value="'+(budget||'')+'" placeholder="연간 예산 입력 (원)" style="width:200px;text-align:left;font-weight:700;color:var(--elec)" onchange="setBudget(this.value)"></td>';
  h+='<td class="total-cell" style="color:var(--elec)">'+(budget?won(budget):'-')+'</td></tr>';

  h+='</tbody>';
  $('dataTable').innerHTML=h;
}

function setVal(month,field,val){
  var v=parseFloat(val)||0;
  if(!D[T][Y]) D[T][Y]={};
  if(!D[T][Y][month]) D[T][Y][month]={u:0,a:0};
  D[T][Y][month][field]=v;
  render();
}

function setBudget(val){
  D[T].budget[Y]=parseInt(val)||0;
  render();
}

// ── 차트 ──
function renderCharts(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var c=COLORS[T];

  if(charts.usage) charts.usage.destroy();
  if(charts.cost) charts.cost.destroy();

  var uData=[],pData=[],wData=[],wpData=[];
  var wd=W[Y]||{};var wpd=W[Y-1]||{};
  for(var m=1;m<=12;m++){
    uData.push(data[m]?data[m].u:null);
    pData.push(prev[m]?prev[m].u:null);
    wData.push(wd[m]!=null?wd[m]:null);
    wpData.push(wpd[m]!=null?wpd[m]:null);
  }
  charts.usage=new Chart($('chartUsage'),{
    type:'bar',data:{labels:months,datasets:[
      {label:Y+'년 사용량',data:uData,backgroundColor:c.main+'cc',borderRadius:4,yAxisID:'y'},
      {label:(Y-1)+'년 사용량',data:pData,backgroundColor:c.light+'88',borderRadius:4,yAxisID:'y'},
      {label:Y+'년 기온',data:wData,type:'line',borderColor:'#e53935',backgroundColor:'#e5393515',tension:.3,pointRadius:4,yAxisID:'y1',borderWidth:2},
      {label:(Y-1)+'년 기온',data:wpData,type:'line',borderColor:'#e5393555',borderDash:[4,4],tension:.3,pointRadius:3,yAxisID:'y1',borderWidth:1.5}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{y:{beginAtZero:true,position:'left',title:{display:true,text:UNITS[T],font:{size:10}}},y1:{position:'right',title:{display:true,text:'°C',font:{size:10}},grid:{drawOnChartArea:false}}}}
  });

  var aData=[],apData=[];
  for(m=1;m<=12;m++){
    aData.push(data[m]?data[m].a:null);
    apData.push(prev[m]?prev[m].a:null);
  }
  charts.cost=new Chart($('chartCost'),{
    type:'line',data:{labels:months,datasets:[
      {label:Y+'년',data:aData,borderColor:c.main,backgroundColor:c.main+'22',fill:true,tension:.3,pointRadius:4},
      {label:(Y-1)+'년',data:apData,borderColor:c.light,borderDash:[5,5],tension:.3,pointRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return won(v)}}}}}
  });
}

// ── 업로드 ──
async function handleUpload(files){
  if(!files||!files.length) return;
  $('uploadStatus').textContent='분석 중...';
  for(var i=0;i<files.length;i++){
    var file=files[i];
    try{
      var dataUrl=await readFile(file);
      var base64=dataUrl.split(',')[1];
      var r=await fetch(WORKER+'/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,billType:T})});
      var d=await r.json();
      if(d.ocr&&d.ocr.year&&d.ocr.month){
        var yr=d.ocr.year,mo=d.ocr.month;
        if(!D[T][yr]) D[T][yr]={};
        if(!D[T][yr][mo]) D[T][yr][mo]={u:0,a:0};
        if(d.ocr.usage_amount) D[T][yr][mo].u=d.ocr.usage_amount;
        if(d.ocr.bill_amount) D[T][yr][mo].a=d.ocr.bill_amount;
        $('uploadStatus').textContent=(i+1)+'/'+files.length+' 완료 ('+yr+'년 '+mo+'월)';
        Y=yr;$('yLabel').textContent=Y+'년';
      } else {
        $('uploadStatus').textContent='인식 실패 — 직접 입력해주세요';
      }
    }catch(e){$('uploadStatus').textContent='오류: '+e.message}
  }
  render();
  setTimeout(function(){$('uploadStatus').textContent=''},3000);
}

function readFile(f){return new Promise(function(ok){var r=new FileReader();r.onload=function(){ok(r.result)};r.readAsDataURL(f)})}

// ── AI 분석 ──
function runAI(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var budget=D[T].budget[Y]||0;
  var arr=[];for(var m=1;m<=12;m++) if(data[m]) arr.push({month:m,usage:data[m].u,amount:data[m].a});
  if(!arr.length){alert('데이터가 없습니다');return}

  var el=$('aiResult');el.style.display='block';el.textContent='AI가 분석 중...';

  // 로컬 분석
  var totalA=arr.reduce(function(s,d){return s+d.amount},0);
  var totalPrev=0;for(m=1;m<=arr.length;m++) if(prev[m]) totalPrev+=prev[m].a||0;
  var change=totalPrev>0?Math.round((totalA-totalPrev)/totalPrev*100):0;
  var maxM=arr.reduce(function(a,b){return b.amount>a.amount?b:a});
  var minM=arr.reduce(function(a,b){return b.amount<a.amount?b:a});
  var avgA=Math.round(totalA/arr.length);

  // 예측
  var predictTotal=totalA;
  var lastMonth=arr[arr.length-1].month;
  for(m=lastMonth+1;m<=12;m++){
    if(prev[m]) predictTotal+=Math.round(prev[m].a*1.03);
    else predictTotal+=avgA;
  }

  var lines=[];
  lines.push('[ '+T+' '+Y+'년 분석 결과 ]\n');
  lines.push('● 현재까지 '+arr.length+'개월 총 '+won(totalA)+' 사용');
  if(totalPrev>0) lines.push('  → 전년 동기 대비 '+(change>0?'+':'')+change+'%');
  lines.push('● 월 평균: '+won(avgA));
  lines.push('● 최고: '+maxM.month+'월 '+won(maxM.amount)+' / 최저: '+minM.month+'월 '+won(minM.amount));
  lines.push('');
  lines.push('● 연말 예상 총액: '+won(predictTotal));
  if(budget){
    var diff=budget-predictTotal;
    if(diff>0) lines.push('  → 예산 대비 '+won(diff)+' 여유 ('+Math.round(predictTotal/budget*100)+'% 사용 예상)');
    else lines.push('  → 예산 '+won(Math.abs(diff))+' 초과 예상! ('+Math.round(predictTotal/budget*100)+'%)');
  }
  lines.push('\n※ DB·날씨 API 연동 후 AI 심층 분석이 제공됩니다');

  el.textContent=lines.join('\n');
}

// ── 포맷 ──
function fnum(n){return n?Number(n).toLocaleString():'-'}
function won(n){
  if(!n&&n!==0) return '-';
  if(Math.abs(n)>=100000000) return (n/100000000).toFixed(1)+'억';
  if(Math.abs(n)>=10000) return Math.round(n/10000).toLocaleString()+'만원';
  return Number(n).toLocaleString()+'원';
}

render();
</script>
