<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>к≥µк≥ЉкЄИ кіАл¶ђ вАФ мҐЕл°ЬлПДмДЬкіА</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root{
  --navy:#0f1f35;
  --elec:#2563eb;--elec-bg:#eff6ff;
  --water:#0891b2;--water-bg:#ecfeff;
  --indigo:#6366f1;--violet:#8b5cf6;
  --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
  --grad-blue:linear-gradient(135deg,#3b82f6,#6366f1);
  --bg:#eef1fb;--surface:#fff;
  --txt:#0f172a;--txt-m:#475569;--txt-l:#94a3b8;
  --border:#e8ebf3;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
  --shadow:0 1px 2px rgba(79,70,229,.04),0 10px 26px rgba(79,70,229,.07);
  --r:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#eaeefe 0%,#f2f0fc 42%,#f7f6fd 100%);background-attachment:fixed;color:var(--txt);font-size:13px;min-height:100vh}

/* вФАвФА нЧ§лНФ вФАвФА */
.hdr{background:linear-gradient(100deg,#0f1f35,#1e1b4b 55%,#312e81);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 4px 20px rgba(49,46,129,.25)}
.hdr-brand{display:flex;align-items:center;gap:10px;color:#fff;font-size:14px;font-weight:700}
.hdr-brand img{height:17px;filter:brightness(10) opacity(.9)}
.hdr-brand .divider{width:1px;height:16px;background:rgba(255,255,255,.2)}
.hdr-tabs{display:flex;gap:3px}
.hdr-tab{padding:7px 16px;border-radius:8px;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;transition:.15s}
.hdr-tab:hover{color:#fff;background:rgba(255,255,255,.08)}
.hdr-tab.on{color:#fff;background:linear-gradient(135deg,rgba(129,140,248,.6),rgba(167,139,250,.5));box-shadow:0 2px 12px rgba(129,140,248,.45)}
.hdr-year{display:flex;align-items:center;gap:7px;color:#fff;flex-shrink:0;white-space:nowrap}
.hdr-brand{flex-shrink:0}
.hdr-year button{width:26px;height:26px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.hdr-year button:hover{background:rgba(255,255,255,.2)}
.hdr-year .yr{font-size:13px;font-weight:700;min-width:52px;text-align:center}

/* вФАвФА л≥ЄлђЄ (1200px кЄ∞м§А) вФАвФА */
.wrap{max-width:1800px;margin:0 auto;padding:12px 24px;display:flex;flex-direction:column;gap:11px;height:calc(100vh - 52px);overflow:hidden}

.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(99,102,241,.1)}
.card-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.card-head h3{font-size:13px;font-weight:700;color:var(--txt)}
.card-head .tag{font-size:10px;font-weight:700;background:var(--elec-bg);color:var(--elec);padding:2px 8px;border-radius:10px}
.card-body{padding:14px 16px;flex:1}

/* вФАвФА KPI 4мєЄ (мЛЬк∞БнЩФ л≤Дм†Д) вФАвФА */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
/* мГБлЛ®: мЭімГБк≤љк≥† + к≤МмЭімІА */
.top-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,2fr);gap:12px;flex:0 0 auto;align-items:stretch}
.alert-card{padding:13px 16px;gap:7px;justify-content:flex-start;border-left:4px solid var(--amber)}
.alert-card.danger{border-left-color:var(--red)}
.alert-card.ok{border-left-color:var(--green)}
.alert-h{font-size:12px;font-weight:800;color:var(--txt-m)}
.alert-more{font-size:10px;color:var(--txt-l);font-weight:600;margin-left:4px}
.alert-title{font-size:20px;font-weight:900;color:var(--txt);line-height:1.15}
.alert-cmp{display:flex;flex-direction:column;gap:5px;margin:3px 0}
.alert-row{display:grid;grid-template-columns:64px 1fr auto;gap:10px;font-size:14px;align-items:center}
.alert-row .alert-yr{font-size:11px;color:var(--txt-l);font-weight:700}
.alert-row.now{font-weight:800}
.alert-row b.up{color:var(--red)}
.alert-row b.dn{color:var(--green)}
.alert-note{font-size:12px;color:var(--txt-m);font-weight:600;background:var(--bg);border-radius:8px;padding:7px 10px;line-height:1.4}
.alert-ok{font-size:22px;font-weight:900;color:var(--green);margin:4px 0}
@media (max-width:900px){.top-row{grid-template-columns:1fr}}
.kpi{background:var(--surface);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;min-height:92px}
.kpi-text{flex:1;min-width:0}
.kpi-label{font-size:10px;font-weight:600;color:var(--txt-l);letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-value{font-size:20px;font-weight:900;line-height:1.1;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:10px;color:var(--txt-m);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-viz{flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* мК§нММнБђлЭЉмЭЄ (лИДм†Б) */
.spark{width:82px;height:44px}

/* мМНлІЙлМА (мЭіл≤ИлЛђ vs мЮСлЕД) */
.pair{display:flex;align-items:flex-end;gap:5px;height:50px;padding-bottom:14px;position:relative}
.pair-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.pair-bar{width:16px;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s ease}
.pair-bar.prev{background:#cbd5e1}
.pair-bar.curr{background:var(--elec)}
.pair-tag{position:absolute;bottom:0;font-size:8px;color:var(--txt-l);font-weight:700;letter-spacing:.2px}
.pair-tag.prev{left:0}
.pair-tag.curr{left:21px}

/* нБ∞ нЩФмВінСЬ (м†ДлЕДлєД) */
.big-arrow{display:flex;align-items:center;gap:2px}
.big-arrow-ico{font-size:34px;font-weight:900;line-height:1}
.big-arrow-pct{font-size:17px;font-weight:900}
.big-arrow.up{color:var(--red)}
.big-arrow.down{color:var(--green)}
.big-arrow.flat{color:var(--txt-l)}
.big-arrow.up .big-arrow-ico{animation:bounceUp 1.5s ease-in-out infinite}
.big-arrow.down .big-arrow-ico{animation:bounceDown 1.5s ease-in-out infinite}
@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes bounceDown{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* лПДлДЫ к≤МмЭімІА (мШИмВ∞) */
.donut{width:62px;height:62px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.donut::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring,#2563eb) 0% calc(var(--pct,0)*1%), #e5e7eb calc(var(--pct,0)*1%) 100%);transition:background .6s}
.donut::after{content:'';position:absolute;inset:6px;background:var(--surface);border-radius:50%}
.donut-inner{position:relative;z-index:1;font-size:13px;font-weight:900;line-height:1;display:flex;flex-direction:column;align-items:center}
.donut-inner .emo{font-size:12px}

/* вФАвФА л©ФмЭЄ кЈЄл¶ђлУЬ вФАвФА */
.main-row{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:12px;flex:0 0 282px;min-height:0}
.side-col>.card{flex:1;min-height:0}
.weather-card .card-body{display:flex;flex-direction:column;height:100%}
.ai-row{flex:1;min-height:0;display:flex}
.ai-row .ai-card{flex:1;min-height:0}
.ai-card .ai-body{flex:1;overflow:auto;display:flex;flex-direction:column;justify-content:center}
/* AI лґДмДЭ лВілЯђнЛ∞лЄМ */
.ai-take{font-size:17px;font-weight:800;padding:13px 17px;border-radius:14px;margin-bottom:12px;line-height:1.45;position:relative;overflow:hidden;animation:aiRise .45s ease both;box-shadow:0 5px 18px rgba(16,24,40,.07)}
.ai-take::after{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(110deg,transparent 36%,rgba(255,255,255,.55) 50%,transparent 64%);background-size:240% 100%;animation:shimmer 4.2s ease-in-out infinite;pointer-events:none}
.ai-take.ok{background:linear-gradient(135deg,#ecfdf5,#f0fdf9);color:#15803d;border:1px solid #bbf7d0;border-left:5px solid #22c55e}
.ai-take.warn{background:linear-gradient(135deg,#fffbeb,#fef9ec);color:#b45309;border:1px solid #fde68a;border-left:5px solid #f59e0b}
.ai-take.danger{background:linear-gradient(135deg,#fef2f2,#fff1f1);color:#b91c1c;border:1px solid #fecaca;border-left:5px solid #ef4444}
/* AI мљФмєШ лІРнТНмД† */
.ai-coach{display:flex;gap:12px;align-items:flex-start;margin-bottom:15px;animation:aiRise .45s both}
.ai-avatar{width:54px;height:54px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:28px;background:linear-gradient(135deg,#a78bfa,#7c3aed);box-shadow:0 9px 20px -6px rgba(124,58,237,.6);animation:floaty 3s ease-in-out infinite}
.ai-coach.warn .ai-avatar{background:linear-gradient(135deg,#fbbf24,#ea580c);box-shadow:0 9px 20px -6px rgba(234,88,12,.55)}
.ai-coach.danger .ai-avatar{background:linear-gradient(135deg,#fb7185,#e11d48);box-shadow:0 9px 20px -6px rgba(225,29,72,.55)}
.ai-bubble{position:relative;flex:1;min-width:0;background:#fff;border:1px solid #ece8fb;border-radius:16px;border-top-left-radius:5px;padding:13px 16px;font-size:15px;font-weight:700;line-height:1.55;color:#2a2546;box-shadow:0 7px 20px -10px rgba(124,58,237,.5)}
.why-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#6d28d9;background:#f1ecfe;border-radius:5px;padding:1px 5px;margin-right:5px;vertical-align:middle;letter-spacing:.2px}
.tip-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#0e7490;background:#e0f7fb;border-radius:5px;padding:1px 5px;margin-right:5px;vertical-align:middle;letter-spacing:.2px}
.ai-bubble::before{content:"";position:absolute;left:-8px;top:18px;border:8px solid transparent;border-right-color:#fff;border-left:0;filter:drop-shadow(-1px 0 0 #ece8fb)}
.ai-lines{display:flex;flex-direction:column;gap:10px;margin-bottom:13px}
.ai-line{font-size:13.5px;color:var(--txt);line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.ai-line .ic{flex-shrink:0;font-size:15px;line-height:1.4}
.ai-line.warn{color:#b45309}
.ai-line b{font-weight:900}
/* AI 4лЛ® нЛА: нШДнЩ©/м†ДлІЭ/м†Рк≤А/м°∞мєШ */
.ai-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ai-grid2x{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0}
.ai-grid2x .ai-sec{justify-content:flex-start}
.ai-grid2x .ai-sec-h{padding-bottom:8px;border-bottom:1px solid rgba(15,23,42,.06)}
.ai-sec-sub2{font-weight:600;font-size:11px;color:var(--txt-l);margin-left:5px}
.ai-item{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;line-height:1.5;color:var(--txt);margin-top:3px}
.ai-item b{font-weight:900}
.ai-bullet{flex-shrink:0;width:19px;height:19px;border-radius:50%;background:var(--amber);color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:1px}
.ai-num{flex-shrink:0;width:19px;height:19px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
.alert-temp{font-size:11.5px;color:var(--txt-m);font-weight:600;background:var(--bg);border-radius:7px;padding:6px 10px}
.alert-temp b.up{color:var(--red)}.alert-temp b.dn{color:var(--elec)}
/* AI лґДмДЭ: мЫФл≥Д нХіл™Е мєілУЬ + м°∞мєШ мєілУЬ */
.ai-card .ai-body{justify-content:flex-start}
.ai-block{margin-bottom:13px}
.ai-block-h{font-size:13.5px;font-weight:800;color:var(--txt-m);margin-bottom:11px;letter-spacing:.2px}
.ai-months{display:flex;gap:10px;flex-wrap:wrap}
.ai-mcard{flex:1 1 0;min-width:185px;border-radius:11px;padding:11px 13px;border-left:4px solid #16a34a;background:#f0fdf4}
.ai-mcard.warn{border-left-color:var(--amber);background:#fffbeb}
.ai-mc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.ai-mc-mo{font-size:14px;font-weight:900;color:var(--txt)}
.ai-mc-yoy{font-size:15px;font-weight:900}
.ai-mc-yoy.up{color:var(--red)}.ai-mc-yoy.dn{color:#16a34a}
.ai-mc-verdict{font-size:12px;font-weight:800;margin-bottom:4px}
.ai-mcard.ok .ai-mc-verdict{color:#15803d}
.ai-mcard.warn .ai-mc-verdict{color:#b45309}
.ai-mc-why{font-size:12px;color:var(--txt-m);line-height:1.45}
.ai-mc-why b{font-weight:900;color:var(--txt)}
.ai-mc-none{font-size:13px;color:#15803d;font-weight:700;background:#f0fdf4;border-radius:10px;padding:12px 14px}
.ai-acts2{display:flex;flex-direction:column;gap:11px}
.ai-act2{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #eef1f5;border-radius:14px;padding:11px 15px;box-shadow:0 1px 3px rgba(16,24,40,.05);transition:.18s cubic-bezier(.2,.8,.2,1);animation:aiRise .5s ease both;position:relative;overflow:hidden}
.ai-act2::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#6366f1,#22d3ee);opacity:0;transition:.18s}
.ai-act2:nth-child(1){animation-delay:.06s}
.ai-act2:nth-child(2){animation-delay:.14s}
.ai-act2:nth-child(3){animation-delay:.22s}
.ai-act2:hover{transform:translateX(4px);box-shadow:0 10px 24px rgba(37,99,235,.15);border-color:#bfdbfe}
.ai-act2:hover::before{opacity:1}
.ai-act2:hover .ai-act-ic{transform:scale(1.1) rotate(-5deg)}
.ai-act-ic{font-size:22px;width:46px;height:46px;flex-shrink:0;border-radius:13px;background:linear-gradient(135deg,#e0e7ff,#ede9fe);box-shadow:inset 0 0 0 1px rgba(99,102,241,.16),0 3px 8px rgba(99,102,241,.16);display:flex;align-items:center;justify-content:center;line-height:1;transition:.2s cubic-bezier(.2,.8,.2,1)}
.ai-act-tx{min-width:0;flex:1}
.ai-act-t{font-size:15.5px;font-weight:800;color:var(--txt);line-height:1.3}
.ai-act-d{font-size:13px;color:var(--txt-m);line-height:1.45;margin-top:3px}
@media (max-width:900px){.ai-acts2{grid-template-columns:1fr}}
.ai-sec{background:var(--bg);border-radius:11px;padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.ai-sec.watch{background:#fffbeb}
.ai-sec.act{background:#f0fdf4}
.ai-sec-h{font-size:13.5px;font-weight:900;color:var(--txt-m);margin-bottom:3px}
.ai-sec.watch .ai-sec-h{color:#b45309}
.ai-sec.act .ai-sec-h{color:#15803d}
.ai-sec-big{font-size:23px;font-weight:900;color:var(--navy);line-height:1.1}
.ai-sec-sub{font-size:12.5px;color:var(--txt-l);line-height:1.45}
.ai-sec-row{font-size:14.5px;color:var(--txt);line-height:1.5}
.ai-sec-row.hi{color:var(--red);font-weight:700}
.ai-sec-row b{font-weight:900}
@media (max-width:980px){.ai-grid4{grid-template-columns:1fr 1fr}}
/* м†Дм≤імЪФкЄИ к≤МмЭімІА */
.bgauge{display:flex;flex-direction:column;justify-content:center;gap:12px;flex:1;min-height:0;padding:2px}
.bgauge-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.bgauge-title{font-size:12.5px;font-weight:800;color:var(--txt-m)}
.bgauge-verdict{font-size:16px;font-weight:900;white-space:nowrap}
.bgauge-bar{height:96px;border-radius:10px;background:#eef2f7;overflow:hidden;display:flex}
.seg{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-width:0;overflow:hidden;border-right:2px solid #fff;box-sizing:border-box;padding:0 2px}
.seg.act{background:linear-gradient(180deg,#60a5fa,#4f46e5);color:#fff}
.seg.pred{background:#eef4fe;color:#3b6fb0;border:1.5px dashed #93c5fd}
.seg.free{background:transparent;color:var(--txt-l);border-right:none;flex:1 1 auto}
.seg-m{font-size:13px;font-weight:800;opacity:.92;line-height:1}
.seg-a{font-size:16.5px;font-weight:900;line-height:1.1;letter-spacing:-.3px;white-space:nowrap}
.seg-free{font-size:12px;font-weight:700}
.seg-free2{font-size:13px;font-weight:900;color:var(--green)}
.bgauge-legend{display:flex;gap:14px;font-size:11px;color:var(--txt-m);align-items:center}
.bgauge-legend .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
.bgauge-legend .dot.a{background:var(--elec)}
.bgauge-legend .dot.p{background:#eef4fe;border:1.5px dashed #93c5fd}
.yoy-badge{display:inline-block;font-weight:900;padding:2px 10px;border-radius:8px;font-size:13.5px;margin:0 3px;vertical-align:middle}
.yoy-badge.up{color:#dc2626;background:#fef2f2}
.yoy-badge.dn{color:#2563eb;background:#eff6ff}
.yoy-badge.flat{color:#64748b;background:#f1f5f9}

/* вФАвФА нГ≠ нМ®лДР (мЫФл≥ДлИДм†Б / PDF / мЮЕл†•нСЬ) вФАвФА */
.tabpanel{min-height:0}
.tabbar{display:flex;gap:3px;padding:9px 14px 0;flex-shrink:0;border-bottom:1px solid #eef1f5}
.tb{padding:9px 15px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--txt-l);cursor:pointer;border-radius:9px 9px 0 0;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.12s;white-space:nowrap}
.tb:hover{color:var(--txt-m);background:#f8fafc}
.tb.on{color:#4f46e5;border-bottom-color:#6366f1}
.tabbody{flex:1;min-height:0;padding:12px 16px 14px;display:flex;flex-direction:column;overflow:hidden}
.tabpane{flex:1;min-height:0;display:flex;flex-direction:column}
.tabpane.top{justify-content:flex-start}
.tabpane.hidden{display:none}
.pane-cap{font-size:12px;font-weight:700;color:var(--txt-m);margin-bottom:10px;flex-shrink:0;line-height:1.4}
.pane-tablewrap{flex:1;min-height:0;overflow:auto;border:1px solid #eef1f5;border-radius:10px}

/* вФАвФА PDF лУЬл°≠м°і вФАвФА */
.dropzone{flex:1;min-height:130px;border:2px dashed #cdd7e5;border-radius:14px;background:linear-gradient(135deg,#f8fbff,#f5fbf9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:.15s;text-align:center;padding:22px}
.dropzone:hover{border-color:var(--elec);background:linear-gradient(135deg,#eff6ff,#f0fdfa)}
.dz-ic{font-size:42px;line-height:1}
.dz-t{font-size:16px;font-weight:800;color:var(--txt)}
.dz-d{font-size:12.5px;color:var(--txt-m);line-height:1.45;max-width:340px}

/* лВ†мФ® лєДкµР мєілУЬ */

function fnum(n){return n?Number(n).toLocaleString():'-'}

}

// вФАвФАвФА лґДмДЭ мЧФмІД (к≤∞м†Хм†Б к≥ДмВ∞ ¬Ј AI мЧЖмЦілПД лПЩмЮС) вФАвФАвФА
// кЄ∞лМА мВђмЪ©лЯЙ = м†ДлЕДлПЩмЫФ √Ч мШђнХі мґФмДЄ √Ч к≥Дм†И(кЄ∞мШ®)л≥ім†Х. мЛ§м†Ьк∞А кЄ∞лМАл•Љ нБђк≤М л≤ЧмЦілВШл©і 'кЄЙм¶Э/мЭімГБ'мЬЉл°Ь нМРм†Х (лЛ®мИЬ м†ДмЫФлєДк∞А мХДлЛИлЭЉ к≥Дм†ИмЭД к∞РмХИнХЬ мІДмІЬ нКР).
function latestYear(){var ys=[];for(var t in D){for(var y in D[t]){if(y==='budget')continue;if(D[t][y]&&Object.keys(D[t][y]).length)ys.push(+y);}}return ys.length?Math.max.apply(null,ys):new Date().getFullYear();}
function yoyTrend(type,year){var cur=D[type][year]||{},prev=D[type][year-1]||{},a=0,b=0;for(var m=1;m<=12;m++){if(cur[m]&&cur[m].u&&prev[m]&&prev[m].u){a+=cur[m].u;b+=prev[m].u;}}return b>0?a/b:1;}
function wFactor(type,m,tNow,tPrev){if(type!=='м†ДкЄ∞'||tNow==null||tPrev==null)return 1;var diff=tNow-tPrev;if(m>=6&&m<=9)return 1+diff*0.03;if(m>=11||m<=3)return 1-diff*0.03;return 1;} // мИШлПДлКФ лВ†мФ® мШБнЦ• к±∞мЭШ мЧЖмЭМ вЖТ л≥ім†Х мХИ нХ®
function expectedU(type,year,m){var prev=(D[type][year-1]||{})[m];if(!prev||!prev.u)return null;var tN=(W[year]||{})[m]?W[year][m].avg:null,tP=(W[year-1]||{})[m]?W[year-1][m].avg:null;return Math.round(prev.u*yoyTrend(type,year)*wFactor(type,m,tN,tP));}
function detectAnomalies(type,year){var cur=D[type][year]||{},out=[];for(var m=1;m<=12;m++){var dm=cur[m];if(!dm||!dm.u)continue;var exp=expectedU(type,year,m);if(!exp)continue;var dev=(dm.u-exp)/exp,pct=Math.round(dev*100);if(dev>=0.18)out.push({month:m,kind:type==='мИШлПД'?'лИДмИШмЭШмЛђ':'кЄЙм¶Э',pct:pct,exp:exp,act:dm.u,sev:dev>=0.35?'high':'medium'});else if(dev<=-0.18)out.push({month:m,kind:'кЄЙк∞Р',pct:pct,exp:exp,act:dm.u,sev:dev<=-0.35?'high':'medium'});}return out;}

function baseLoad(type,year){var cur=D[type][year]||{},us=[];for(var m=1;m<=12;m++)if(cur[m]&&cur[m].u)us.push(cur[m].u);if(us.length<3)return null;var min=Math.min.apply(null,us),avg=us.reduce(function(a,b){return a+b;},0)/us.length;var prev=D[type][year-1]||{},pus=[];for(var m=1;m<=12;m++)if(prev[m]&&prev[m].u)pus.push(prev[m].u);var pmin=pus.length?Math.min.apply(null,pus):null;return{min:min,avg:Math.round(avg),ratio:avg?min/avg:0,prevMin:pmin,rise:pmin?Math.round((min-pmin)/pmin*100):null};}
// лЛ§мЭМ лЛђ мЪФкЄИ мШИмЄ°: м†ДлЕДлПЩмЫФ √Ч мШђнХімґФмДЄ √Ч мШђнХі нПЙкЈ†лЛ®к∞А

// SVG мК§нММнБђлЭЉмЭЄ
function sparkSVG(values,color,w,h){
  var vs=values.filter(v=>v!=null);
  if(!vs.length)return '';
  var max=Math.max(...vs),min=Math.min(0,Math.min(...vs));
  var step=w/(values.length-1);
  var pts=values.map((v,i)=>{
    var y=v==null?h:h-((v-min)/(max-min||1))*(h-2)-1;
    return (i*step).toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" preserveAspectRatio="none">'
    +'<polygon points="0,'+h+' '+pts+' '+w+','+h+'" fill="'+color+'" opacity="0.18"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

function renderBudgetGauge(){
  var el=$('budgetGauge');if(!el)return;
  var data=D[T][Y]||{},budget=D[T].budget[Y]||0,nm=T==='мИШлПД'?'мИШлПД':'м†ДкЄ∞';
  var au=0,ac=0;for(var m=1;m<=12;m++){if(data[m]&&data[m].u&&data[m].a){au+=data[m].a/data[m].u;ac++;}}au=ac?au/ac:0;
  var man=function(v){return Math.round(v/10000);}; // лІМмЫР лЛ®мЬД
  var segs=[],actual=0,proj=0;
  for(m=1;m<=12;m++){
    var amt=0,use=0,pred=false;
    if(data[m]&&data[m].a){amt=data[m].a;use=data[m].u||0;actual+=amt;}
    else{var pr=predict(m);if(pr){use=pr.u||0;amt=(au&&pr.u)?Math.round(pr.u*au):pr.a;proj+=amt;pred=true;}}
    if(amt>0)segs.push({m:m,amt:amt,use:use,pred:pred});
  }
  var projFull=actual+proj,over=budget&&projFull>budget,diff=budget-projFull;
  var lastTot=0,prevY=D[T][Y-1]||{};for(m=1;m<=12;m++){if(prevY[m]&&prevY[m].a)lastTot+=prevY[m].a;}
  var yoyPct=lastTot?Math.round((projFull-lastTot)/lastTot*100):null;

  if(!budget){el.innerHTML='<div class="bgauge-top"><span class="bgauge-title">рЯТ∞ мШђнХі '+nm+' мЫФл≥Д мЪФкЄИ</span><span class="bgauge-verdict" style="color:var(--txt-l)">мШИмВ∞ лѓЄмД§м†Х</span></div><div class="bgauge-bar"></div>';return;}
  var vc=over?'var(--red)':(projFull/budget>0.92?'var(--amber)':'var(--green)');
  var bar='';
  segs.forEach(function(s){var w=Math.max(0,s.amt/budget*100);var inner='<span class="seg-m">'+s.m+'мЫФ</span><span class="seg-a">'+man(s.amt)+'лІМ</span>';bar+='<div class="seg '+(s.pred?'pred':'act')+'" style="width:'+w+'%" title="'+s.m+'мЫФ ¬Ј '+fnum(s.use)+UNITS[T]+(s.pred?' ¬Ј мШИмЄ° ':' ¬Ј ')+won(s.amt)+'">'+inner+'</div>';});
  var freePct=Math.max(0,(budget-projFull)/budget*100);
  if(!over&&freePct>1.5)bar+='<div class="seg free" style="width:'+freePct+'%"><span class="seg-free">мЧђмЬ†</span><span class="seg-free2">'+won(diff)+'</span></div>';
  // рЯ§Ц мљФмєШ нХЬлІИлФФ (к≤МмЭімІАмЩА к∞ЩмЭА мИЂмЮР: мВђмЪ©лЯЙ YoY + мЧ∞лІР м†ДлІЭ + м†Рк≤АнХ† лЛђ)
  var uN=0,uP=0;for(m=1;m<=12;m++){if(data[m]&&data[m].u){uN+=data[m].u;if(prevY[m])uP+=prevY[m].u||0;}}

  var pat=(function(){var cv=document.createElement('canvas');cv.width=6;cv.height=6;var x=cv.getContext('2d');x.fillStyle='#eef4fe';x.fillRect(0,0,6,6);x.strokeStyle='#9ec3fb';x.lineWidth=1.3;x.beginPath();x.moveTo(0,6);x.lineTo(6,0);x.stroke();return x.createPattern(cv,'repeat');})();
  var nowBars=[],nowColors=[],lastBars=[];
  for(var m=1;m<=12;m++){
    var dm=data[m];
    if(dm&&dm.u){nowBars.push(dm.u);nowColors.push((anoM[m]&&anoM[m].kind!=='кЄЙк∞Р')?'#dc2626':c.main);}
    else{var pr=predict(m);nowBars.push(pr?pr.u:null);nowColors.push(pat);}
    lastBars.push(prev[m]?prev[m].u:null);
  }

  $('chartLegends').innerHTML=
    '<span><span class="sw" style="background:#cbd5e1"></span>мЮСлЕД</span>'
    +'<span><span class="sw" style="background:'+c.main+'"></span>мШђнХі</span>'
    +'<span><span class="sw" style="background:#dc2626"></span>'+(T==='мИШлПД'?'лИДмИШмЭШмЛђ':'кЄЙм¶Э')+'</span>'
    +'<span><span class="sw" style="background:repeating-linear-gradient(135deg,#eef4fe,#eef4fe 3px,#9ec3fb 3px,#9ec3fb 5px)"></span>мШђнХі мШИмЄ°</span>'
    +'<span style="color:var(--txt-l);margin-left:2px">лІЙлМА мЬД %=мЮСлЕДжѓФ мВђмЪ©лЯЙ</span>';

  // мЫФл≥Д мЮСлЕД лМАлєД м¶Эк∞Рл•† (м£ЉмЛЭ вЦ≤вЦЉ) вАФ мЛ§мЄ° мЫФлІМ, мШђнХі лІЙлМА мЬДмЧР нСЬкЄ∞
  var monthYoY=[];for(var mm=1;mm<=12;mm++){var nb=nowBars[mm-1],lb=lastBars[mm-1],act=!!(data[mm]&&data[mm].u);monthYoY.push((act&&nb!=null&&lb)?Math.round((nb-lb)/lb*100):null);}
  var yoyBadge={id:'yoyBadge',afterDatasetsDraw:function(ch){var mt=ch.getDatasetMeta(1);if(!mt||mt.hidden)return;var x=ch.ctx;x.save();x.font='800 13px '+getComputedStyle(document.body).fontFamily;x.textAlign='center';x.textBaseline='middle';mt.data.forEach(function(b,i){var p=monthYoY[i];if(p==null)return;var t=p>0?'вЦ≤'+p+'%':(p<0?'вЦЉ'+Math.abs(p)+'%':'0%');var col=p>0?'#dc2626':(p<0?'#2563eb':'#64748b');var bg=p>0?'#fee2e2':(p<0?'#dbeafe':'#e2e8f0');var w=x.measureText(t).width+14,h=21,cx=b.x,cy=b.y-15;if(x.roundRect){x.beginPath();x.roundRect(cx-w/2,cy-h/2,w,h,9);x.fillStyle=bg;x.fill();}x.fillStyle=col;x.fillText(t,cx,cy);});x.restore();}};

  charts.main=new Chart($('chartMain'),{
    type:'bar',
    plugins:[yoyBadge],
    data:{labels,datasets:[
      {label:'мЮСлЕД',data:lastBars,backgroundColor:'#cbd5e1',borderRadius:5,borderSkipped:false,categoryPercentage:.66,barPercentage:.92},
      {label:'мШђнХі',data:nowBars,backgroundColor:nowColors,borderRadius:5,borderSkipped:false,categoryPercentage:.66,barPercentage:.92}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:600,easing:'easeOutQuart'},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'rgba(15,31,53,.95)',titleFont:{size:12,weight:'700'},bodyFont:{size:11},padding:11,cornerRadius:8,
          callbacks:{
            title:items=>{var mo=items[0].dataIndex+1;var an=anoM[mo];var tag='';if(an)tag=an.kind==='кЄЙк∞Р'?'  вЖУкЄЙк∞Р '+an.pct+'%':'  вЪ†'+an.kind+' +'+an.pct+'%';return mo+'мЫФ'+tag;},
            label:ctx=>{var v=ctx.parsed.y;if(v==null)return null;var mo=ctx.dataIndex+1,isNow=ctx.dataset.label==='мШђнХі',bd=isNow?(D[T][Y]||{})[mo]:null;return ' '+ctx.dataset.label+' '+fnum(v)+' '+UNITS[T]+(isNow&&!bd?' (мШИмЄ°)':'')+(bd&&bd.a?' ¬Ј '+won(bd.a):'');},
            afterBody:items=>{var mo=items[0].dataIndex+1,n=(D[T][Y]||{})[mo],p=(D[T][Y-1]||{})[mo];if(n&&p&&p.u){var d=Math.round((n.u-p.u)/p.u*100);return 'мЮСлЕДжѓФ '+(d>0?'+':'')+d+'%';}return '';}
          }
        }
      },
      onClick:(e,el)=>{if(el&&el.length){FM=el[0].index+1;}},
      scales:{
        y:{beginAtZero:true,grace:'22%',title:{display:true,text:UNITS[T],font:{size:10,weight:'600'},color:c.main},ticks:{font:{size:10},color:'#64748b',maxTicksLimit:6,callback:v=>v>=1000?(v/1000)+'k':v},grid:{color:'rgba(0,0,0,.05)'},border:{display:false}},
        x:{ticks:{font:{size:11}},grid:{display:false}}
      }
    }
  });
}

// вФАвФАвФА AI (кЈЄл¶ЉмЬЉл°Ь лІРнХШкЄ∞) вФАвФАвФА
// AI нМ®лДРмЭА к≤∞м†Хм†Б мЧФмІДмЬЉл°Ь лПЩкЄ∞ л†МлНФ (нГ≠/мЧ∞лПД м†ДнЩШ мЛЬ м¶ЙмЛЬ¬ЈмЭЉкіА вАФ мЫМмї§ лєДлПЩкЄ∞ л†ИмЭімК§ м†Ьк±∞).
// LLM лђЄмЮ• лЛ§лУђкЄ∞лКФ мЫМмї§ м†ХлєД нЫД staleness к∞АлУЬмЩА нХ®кїШ мЮђлПДмЮЕ мШИм†Х.
function renderAI(){
  var data=D[T][Y]||{},arr=[];
  for(var m=1;m<=12;m++)if(data[m])arr.push({month:m,u:data[m].u,a:data[m].a});
  var el=$('aiContent');
  if(!arr.length){el.innerHTML='<div class="ai-empty">рЯУЭ лН∞мЭінД∞л•Љ мЮЕл†•нХШл©і мЮРлПЩ лґДмДЭнХ©лЛИлЛ§</div>';$('aiTag').textContent='мЮРлПЩ';return;}
  renderAIFrame(el,arr,null);
  $('aiTag').textContent='мЮРлПЩ лґДмДЭ';
}

// лИИмЧР лЭДк≤М м∞®мЭілВШлКФ лЛђмЭШ мЮСлЕД лМАлєД м∞®мЭіл•Љ 'кЈЄ к≤Амє®кЄ∞к∞Д мЛ§м†Ь лВ†мФ®'л°Ь мД§л™Е мЛЬлПД
function monthlyExplain(type,year){
  var cur=D[type][year]||{},prev=D[type][year-1]||{},out=[];
  for(var m=1;m<=12;m++){
    var c=cur[m],p=prev[m];if(!c||!p||!p.u||!c.u)continue;
    var yoy=Math.round((c.u-p.u)/p.u*100); // м∞®нКЄ лІЙлМА(мВђмЪ©лЯЙ)мЩА к∞ЩмЭА кЄ∞м§АмЬЉл°Ь нЖµмЭЉ
    if(Math.abs(yoy)<7)continue; // лИИмЧР лЭДк≤М м∞®мЭілВШлКФ лЛђлІМ
    var tN=(W[year]||{})[m],tP=(W[year-1]||{})[m];
    var tD=(tN&&tP)?Math.round((tN.avg-tP.avg)*10)/10:null;
    var heat=(m>=11||m<=4),cool=(m>=7&&m<=10),exp=false,emo='вЪ†пЄП',word='',cost='';
    if(type!=='мИШлПД'&&tD!=null){
      if(heat&&yoy>0&&tD<=-0.5){exp=true;emo='вЭДпЄП';word='лНФ мґФмЫ†мЦімЪФ';cost='лВЬл∞©лєД';}
      else if(heat&&yoy<0&&tD>=0.5){exp=true;emo='вШАпЄП';word='лНФ лФ∞лЬїнЦИмЦімЪФ';cost='лВЬл∞©лєД';}
      else if(cool&&yoy>0&&tD>=0.5){exp=true;emo='рЯФ•';word='лНФ лНФмЫ†мЦімЪФ';cost='лГЙл∞©лєД';}
      else if(cool&&yoy<0&&tD<=-0.5){exp=true;emo='рЯНГ';word='лНФ мЛЬмЫРнЦИмЦімЪФ';cost='лГЙл∞©лєД';}
    }
    var arr=yoy>0?'вЦ≤+'+yoy+'%':'вЦЉ'+Math.abs(yoy)+'%';
    var why,short;
    if(exp){
      why='мЮСлЕДл≥ілЛ§ <b>'+Math.abs(tD)+'¬∞</b> '+word+' вЖТ '+cost+(yoy>0?'к∞А лНФ лВШк∞ФмЦімЪФ':'л•Љ мХДкЉИмЦімЪФ');
      short='<span class="ex-emo">'+emo+'</span><span class="ex-w">'+word+'</span><span class="ex-p">мВђмЪ© '+arr+'</span>';
    }else if(type==='мИШлПД'){
      exp=true; // мИШлПДлКФ лВ†мФ®мЩА лђікіА вАФ м†ХмГБ л≥АлПЩмЭД к≤љк≥†л°Ь лЭДмЪ∞мІА мХКмЭМ
      why='мИШлПДлКФ лВ†мФ®мЩА лђікіАнХімЪФ. нПЙмЖМ мВђмЪ© нЭРл¶ДмЭімЧРмЪФ';
      short='<span class="ex-emo">рЯТІ</span><span class="ex-w">'+(yoy>0?'мВђмЪ© лКШмЦімЪФ':'мВђмЪ© м§ДмЦімЪФ')+'</span><span class="ex-p">'+arr+'</span>';
    }else{
      why='кЄ∞мШ® мШБнЦ•мЭА мХДлЛМ к≤Г к∞ЩмХДмЪФ вАФ нЦЙмВђ¬ЈмД§лєДл•Љ нЩХмЭЄнХі л≥імДЄмЪФ';
      short='<span class="ex-emo">рЯФО</span><span class="ex-w">нЩХмЭЄ нХДмЪФ</span><span class="ex-p">'+arr+'</span>';
    }
    out.push({month:m,yoy:yoy,explained:exp,why:why,emo:emo,short:short});
  }
  return out;
}

// AI лґДмДЭ = нХЬ м§Д мЭЉмє® + рЯУЕ мЫФл≥Д нХіл™Е(лВ†мФ® кЈЉк±∞) + рЯТ° кґМмЮ• м°∞мєШ
function renderAIFrame(el,arr,a){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var anoUp=detectAnomalies(T,Y).filter(function(x){return x.kind==='кЄЙм¶Э'||x.kind==='лИДмИШмЭШмЛђ';}); // мґФмДЄ(м†ДкЄ∞лКФ лВ†мФ®кєМмІА) к∞РмХИнХілПД нБђк≤М нКД мІДмІЬ мЭімГБмєШлІМ

  // кґМмЮ• м°∞мєШ = 'кЈЉк±∞'(мЛ§м†Ь лН∞мЭінД∞ мЛ†нШЄ)мЩА 'нМБ'(мЭЉл∞Ш мИШмєЩ) кµђлґД вАФ мґФм†ХмЭД кЈЉк±∞л°Ь лСФк∞СмЛЬнВ§мІА мХКмЭМ
  var fc=forecastNext(T,Y),nmx=fc?fc.month:0;
  if(!nmx){var lm=0;for(var mm=1;mm<=12;mm++)if(data[mm]&&(data[mm].u||data[mm].a))lm=mm;nmx=lm>=12?1:lm+1;}
  var actions=[];
  // кЈЉк±∞: мґФмДЄ к∞РмХИнХілПД нБђк≤М нКД лЛђлІМ (м†ХмГБ л≥АлПЩмЭА мХИ к±ілУЬл¶Љ)
  anoUp.slice(0,2).forEach(function(x){var c=data[x.month]||{},p=prev[x.month]||{},ay=(c.a&&p.a)?Math.round((c.a-p.a)/p.a*100):null;actions.push({ic:'рЯФО',tag:'кЈЉк±∞',t:x.month+'мЫФ нЩХмЭЄ',why:'мЮСлЕД к∞ЩмЭА лЛђл≥ілЛ§ '+(ay?'+'+ay+'% ':'')+'лІОмЭі лВШмЩФмЦімЪФ ¬Ј '+(T==='мИШлПД'?'лИДмИШ к∞АлК•мД± м†Рк≤А':'нЦЙмВђ¬ЈмЮДмЛЬмД§лєД нЩХмЭЄ')});});
  // м†ДкЄ∞лКФ мІБмЫРмЭі м°∞м†Х к∞АлК•нХЬ м†ИмХљ мИШмєЩ(Tip). мИШлПДлКФ мВђмЪ© м†ХмГБ+лЛ®к∞А мШБнЦ•мЭілЭЉ 'мЧЕлђі мІАмЛЬ' лМАмЛ† мХМмХДлСШ м†Хл≥і(м∞Єк≥†).
  var tips,tipTag;
  if(T==='м†ДкЄ∞'){
    tipTag='Tip';
    tips=[
      (nmx>=6&&nmx<=9?{ic:'рЯМ°пЄП',t:'лГЙл∞© 26вДГ мЭімГБ',why:'мЧђл¶Д кґМмЮ• 26~28вДГ ¬Ј 1вДГ лЖТмЭіл©і лГЙл∞©м†Дл†• мХљ 7% м†Ик∞Р'}:(nmx>=11||nmx<=3)?{ic:'рЯФ•',t:'лВЬл∞© 20вДГ мЭінХШ',why:'к≤®мЪЄ кґМмЮ• 18~20вДГ ¬Ј 1вДГ лВЃмґФл©і лВЬл∞©м†Дл†• мХљ 7% м†Ик∞Р'}:{ic:'рЯМ°пЄП',t:'лГЙлВЬл∞© м†Бм†ХмШ®лПД',why:'мЧђл¶Д 26вДГ¬Јк≤®мЪЄ 20вДГ ¬Ј 1вДГ м∞®мЭік∞А мХљ 7%'}),
      {ic:'рЯФМ',t:'лМАкЄ∞м†Дл†• м∞®лЛ®',why:'мХИ мУ∞лКФ PC¬Јл≥µнХ©кЄ∞ мљШмДЉнКЄ OFF ¬Ј лМАкЄ∞м†Дл†•мЭі м†ДкЄ∞мЭШ мХљ 6%'},
      {ic:'рЯТ°',t:'LED¬ЈмДЉмДЬ м°∞л™Е',why:'нШХкіСлУ±вЖТLED м°∞л™Ем†Дл†• 50%вЖУ ¬Ј л≥µлПД¬ЈнЩФмЮ•мЛ§ мЭЄм≤ік∞РмІА'}
    ];
  }else{
    tipTag='м∞Єк≥†';
    tips=[];
    if(!anoUp.length)tips.push({ic:'рЯУК',t:'мВђмЪ©лЯЙмЭА м†ХмГБмЭімЧРмЪФ',why:'мШђнХі мВђмЪ©мЭА мЮСлЕДк≥Љ лєДмКЈнХімЪФ вАФ к≥ЉмВђмЪ© мХДлЛИмЧРмЪФ'});
    tips.push({ic:'рЯТІ',t:'мЪФкЄИвЖСлКФ лђЉк∞Т(лЛ®к∞А) мШБнЦ•',why:'мВђмЪ©мЭі кЈЄлМАл°ЬмЧђлПД 1m¬≥лЛє лЛ®к∞Ак∞А мШ§л•іл©і мЪФкЄИмЭі мШђлЭЉмЪФ'});
    tips.push({ic:'рЯТЄ',t:'мШИмВ∞мЭА лЛ®к∞А кЄ∞м§АмЬЉл°Ь',why:'м†Ик∞Р мЧђл†•мЭА мЮСмХДмЪФ вАФ лВілЕД мШИмВ∞мЧР лЛ®к∞А мЭЄмГБлґДмЭД л∞ШмШБ'});
  }
  tips.forEach(function(g){g.tag=tipTag;});
  actions=actions.concat(tips).slice(0,3);

  var blockH=(T==='мИШлПД'&&!anoUp.length)?'рЯТ° мХМмХДлСРмДЄмЪФ':'рЯТ° мЭіл†Зк≤М нХШмДЄмЪФ';
  el.innerHTML='<div class="ai-block"><div class="ai-block-h">'+blockH+'</div><div class="ai-acts2">'+actions.map(function(x){return '<div class="ai-act2"><span class="ai-act-ic">'+x.ic+'</span><div class="ai-act-tx"><div class="ai-act-t">'+x.t+'</div><div class="ai-act-d"><span class="'+(x.tag==='кЈЉк±∞'?'why-tag':'tip-tag')+'">'+x.tag+'</span>'+x.why+'</div></div></div>';}).join('')+'</div></div>';
}

// вФАвФАвФА нЕМмЭілЄФ вФАвФАвФА
function renderTable(){
  var data=D[T][Y]||{},unit=UNITS[T],budget=D[T].budget[Y]||'';
  var h='<thead><tr><th></th>';for(var m=1;m<=12;m++)h+='<th>'+m+'</th>';h+='<th>нХ©к≥Д</th></tr></thead><tbody>';
  var tU=0;h+='<tr><td class="rl">мВђмЪ©('+unit+')</td>';for(m=1;m<=12;m++){var v=data[m]?data[m].u:'';if(v)tU+=v;h+='<td><input type="number" value="'+(v||'')+'" placeholder="вАФ" onchange="setVal('+m+',\'u\',this.value)"></td>';}h+='<td class="tot">'+fnum(tU)+'</td></tr>';
  var tA=0;h+='<tr><td class="rl">мЪФкЄИ(мЫР)</td>';for(m=1;m<=12;m++){var v2=data[m]?data[m].a:'';if(v2)tA+=v2;h+='<td><input type="number" value="'+(v2||'')+'" placeholder="вАФ" onchange="setVal('+m+',\'a\',this.value)"></td>';}h+='<td class="tot">'+won(tA)+'</td></tr>';
  h+='<tr class="budget-row"><td class="rl" style="color:var(--elec)">мШИмВ∞</td><td colspan="12"><input type="number" value="'+(budget||'')+'" placeholder="мЧ∞к∞Д мШИмВ∞ (мЫР)" onchange="setBudget(this.value)"></td><td class="tot" style="color:var(--elec)">'+(budget?won(budget):'вАФ')+'</td></tr></tbody>';
  $('dataTable').innerHTML=h;
}

// OCR
async function handleUpload(files){if(!files||!files.length)return;var st=$('uploadStatus');st.textContent='лґДмДЭ м§СвА¶';var results=[],total=0;for(var i=0;i<files.length;i++){var file=files[i],images=[];try{if(file.type==='application/pdf'){images=await pdfToImages(file);}else{var du=await readFile(file);images=[du.split(',')[1]];}for(var j=0;j<images.length;j++){total++;st.textContent='OCR '+total+'л≤ИмІЄвА¶';var result=await ocrImage(images[j]);if(result)results.push(result);}}catch(e){}}if(!results.length){st.textContent='мЭЄмЛЭ мЛ§нМ®';}else{var msgs=[];results.forEach(async r=>{var type=r.bill_type||T,yr=r.year,mo=r.month;if(!yr||!mo)return;if(!D[type])D[type]={budget:{}};if(!D[type][yr])D[type][yr]={};if(!D[type][yr][mo])D[type][yr][mo]={u:0,a:0};if(r.usage_amount)D[type][yr][mo].u=r.usage_amount;if(r.bill_amount)D[type][yr][mo].a=r.bill_amount;await saveB(type,yr,mo,D[type][yr][mo].u,D[type][yr][mo].a);msgs.push(type+' '+yr+'/'+mo+'мЫФ '+won(r.bill_amount||0));});st.textContent=results.length+'к±і мЩДл£М!';showToast(msgs);if(results[0].month)FM=results[0].month;}render();$('fileIn').value='';setTimeout(()=>st.textContent='',5000);}
async function pdfToImages(file){if(!window.pdfjsLib)throw new Error('PDF лѓЄмІАмЫР');var ab=await file.arrayBuffer(),pdf=await pdfjsLib.getDocument({data:ab}).promise,imgs=[];for(var p=1;p<=Math.min(pdf.numPages,6);p++){var pg=await pdf.getPage(p),vp=pg.getViewport({scale:2}),cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;imgs.push(cv.toDataURL('image/jpeg',.85).split(',')[1]);}return imgs;}
async function ocrImage(b64){try{var r=await fetch(WORKER+'/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});var d=await r.json();return(d.ocr&&(d.ocr.year||d.ocr.bill_amount))?d.ocr:null;}catch(e){return null;}}
function readFile(f){return new Promise(ok=>{var r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(f);})}
function showToast(msgs){document.querySelector('.toast')?.remove();if(!msgs.length)return;var d=document.createElement('div');d.className='toast';d.innerHTML='<b>вЬЕ мЭЄмЛЭ мЩДл£М</b><br>'+msgs.join('<br>');document.body.appendChild(d);setTimeout(()=>d.remove(),6000);}

Y=latestYear();render();
