<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공과금 관리 — 종로도서관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root{
  --navy:#0f1f35;
  --elec:#2563eb;--elec-bg:#eff6ff;
  --gas:#ea580c;--gas-bg:#fff7ed;
  --water:#0891b2;--water-bg:#ecfeff;
  --bg:#f1f5f9;--surface:#fff;
  --txt:#0f172a;--txt-m:#475569;--txt-l:#94a3b8;
  --border:#e5e7eb;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
  --r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);font-size:12px;min-height:100vh}

/* ── 헤더 ── */
.hdr{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px;color:#fff;font-size:14px;font-weight:700}
.hdr-brand img{height:17px;filter:brightness(10) opacity(.9)}
.hdr-brand .divider{width:1px;height:16px;background:rgba(255,255,255,.2)}
.hdr-tabs{display:flex;gap:3px}
.hdr-tab{padding:7px 16px;border-radius:8px;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;transition:.15s}
.hdr-tab:hover{color:#fff;background:rgba(255,255,255,.08)}
.hdr-tab.on{color:#fff;background:rgba(255,255,255,.18)}
.hdr-year{display:flex;align-items:center;gap:7px;color:#fff}
.hdr-year button{width:26px;height:26px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.hdr-year button:hover{background:rgba(255,255,255,.2)}
.hdr-year .yr{font-size:13px;font-weight:700;min-width:52px;text-align:center}

/* ── 본문 (1200px 기준) ── */
.wrap{max-width:1200px;margin:0 auto;padding:16px 18px 30px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.card-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.card-head h3{font-size:13px;font-weight:700;color:var(--txt)}
.card-head .tag{font-size:10px;font-weight:700;background:var(--elec-bg);color:var(--elec);padding:2px 8px;border-radius:10px}
.card-body{padding:14px 16px;flex:1}

/* ── KPI 4칸 (시각화 버전) ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--surface);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;min-height:92px}
.kpi-text{flex:1;min-width:0}
.kpi-label{font-size:10px;font-weight:600;color:var(--txt-l);letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-value{font-size:20px;font-weight:900;line-height:1.1;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:10px;color:var(--txt-m);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-viz{flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* 스파크라인 (누적) */
.spark{width:82px;height:44px}

/* 쌍막대 (이번달 vs 작년) */
.pair{display:flex;align-items:flex-end;gap:5px;height:50px;padding-bottom:14px;position:relative}
.pair-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.pair-bar{width:16px;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s ease}
.pair-bar.prev{background:#cbd5e1}
.pair-bar.curr{background:var(--elec)}
.pair-tag{position:absolute;bottom:0;font-size:8px;color:var(--txt-l);font-weight:700;letter-spacing:.2px}
.pair-tag.prev{left:0}
.pair-tag.curr{left:21px}

/* 큰 화살표 (전년비) */
.big-arrow{display:flex;align-items:center;gap:2px}
.big-arrow-ico{font-size:34px;font-weight:900;line-height:1}
.big-arrow-pct{font-size:17px;font-weight:900}
.big-arrow.up{color:var(--red)}
.big-arrow.down{color:var(--green)}
.big-arrow.flat{color:var(--txt-l)}
.big-arrow.up .big-arrow-ico{animation:bounceUp 1.5s ease-in-out infinite}
.big-arrow.down .big-arrow-ico{animation:bounceDown 1.5s ease-in-out infinite}
@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes bounceDown{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* 도넛 게이지 (예산) */
.donut{width:62px;height:62px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.donut::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring,#2563eb) 0% calc(var(--pct,0)*1%), #e5e7eb calc(var(--pct,0)*1%) 100%);transition:background .6s}
.donut::after{content:'';position:absolute;inset:6px;background:var(--surface);border-radius:50%}
.donut-inner{position:relative;z-index:1;font-size:13px;font-weight:900;line-height:1;display:flex;flex-direction:column;align-items:center}
.donut-inner .emo{font-size:12px}

/* ── 메인 그리드 ── */
.main-row{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:14px}

/* 차트 카드 */
.chart-card{height:380px}
.chart-box{flex:1;min-height:0;position:relative;padding:10px 14px 14px;height:340px}
.chart-legends{display:flex;gap:10px;font-size:10px;color:var(--txt-m);flex-wrap:wrap}
.chart-legends span{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.chart-legends .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
.chart-legends .sw-line{width:14px;height:2px;border-radius:2px;display:inline-block}
.chart-legends .sw-dash{width:14px;height:0;border-top:1.5px dashed #dc2626;display:inline-block}

/* 사이드 (날씨+월상세) */
.side-col{display:flex;flex-direction:column;gap:14px;min-height:0}

/* ── 날씨 (큰 시각화) ── */
.w-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.w-emoji{font-size:52px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.w-temp{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px}
.w-desc{font-size:11px;color:var(--txt-m);margin-top:3px;font-weight:600}
.w-compare{display:flex;gap:6px;margin-bottom:10px}
.w-compare-chip{flex:1;background:var(--bg);border-radius:8px;padding:6px 8px;text-align:center}
.w-compare-lbl{font-size:9px;color:var(--txt-l);font-weight:600}
.w-compare-val{font-size:12px;font-weight:900;margin-top:2px}
.hot{color:var(--red)}.cold{color:var(--elec)}.norm{color:var(--txt-m)}
.w-mini{height:40px;display:flex;align-items:flex-end;gap:2px;padding-top:6px;border-top:1px dashed var(--border)}
.w-mini-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.w-mini-bar{width:100%;background:#cbd5e1;border-radius:2px 2px 0 0;min-height:2px}
.w-mini-bar.now{background:var(--elec)}
.w-mini-lbl{font-size:7px;color:var(--txt-l);font-weight:700}

/* ── 월상세 (미니바) ── */
.focus-nav-inline{display:flex;align-items:center;gap:3px}
.focus-nav-inline button{width:20px;height:20px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;color:var(--txt-m)}
.focus-nav-inline button:hover{background:var(--bg)}
.focus-month{font-size:12px;font-weight:900;color:var(--txt);min-width:26px;text-align:center}
.mm-list{display:flex;flex-direction:column;gap:8px}
.mm-row{display:flex;align-items:center;gap:7px;font-size:10.5px}
.mm-label{width:28px;color:var(--txt-l);font-weight:700;font-size:9.5px;flex-shrink:0}
.mm-bar{flex:1;height:10px;background:var(--bg);border-radius:5px;position:relative;overflow:hidden;min-width:0}
.mm-bar-fill{height:100%;border-radius:5px;transition:width .5s ease;position:absolute;left:0;top:0}
.mm-bar-prev{position:absolute;top:-2px;bottom:-2px;width:2px;background:rgba(15,23,42,.5);border-radius:1px;z-index:2}
.mm-val{font-size:10.5px;font-weight:900;min-width:52px;text-align:right;flex-shrink:0}
.mm-delta{font-size:9.5px;font-weight:700;min-width:32px;text-align:right;flex-shrink:0}

/* ── AI 분석 (그림으로 말하기) ── */
.ai-card{min-height:220px}
.ai-body{padding:14px 16px}
.ai-summary{padding:11px 14px;background:linear-gradient(135deg,#eff6ff 0%,#f5f3ff 100%);border-radius:10px;margin-bottom:12px;font-size:12px;font-weight:700;color:var(--navy);line-height:1.5;display:flex;align-items:center;gap:9px}
.ai-summary .ico{font-size:18px;flex-shrink:0}
.ai-grid{display:grid;grid-template-columns:1fr 1.3fr 2fr;gap:12px}

/* 상태 페이스 */
.ai-face{background:var(--bg);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.ai-face-emo{font-size:54px;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,.1))}
.ai-face-text{font-size:11px;font-weight:900;margin-top:4px}
.ai-face.ok .ai-face-text{color:var(--green)}
.ai-face.warn .ai-face-text{color:var(--amber)}
.ai-face.danger .ai-face-text{color:var(--red)}
.ai-face-sub{font-size:9px;color:var(--txt-m);text-align:center;line-height:1.3}

/* 시각 3개 */
.ai-viz{display:flex;flex-direction:column;gap:8px}
.ai-viz-item{background:var(--bg);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:9px}
.ai-viz-ico{flex-shrink:0;width:40px;height:34px;display:flex;align-items:center;justify-content:center}
.ai-viz-body{flex:1;min-width:0}
.ai-viz-label{font-size:9px;color:var(--txt-l);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.ai-viz-val{font-size:13px;font-weight:900;line-height:1.1;margin-top:1px}
.ai-viz-sub{font-size:9px;color:var(--txt-m);margin-top:1px}

/* 진행바 (예산) */
.progress{width:100%;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:3px}
.progress-fill{height:100%;border-radius:3px;transition:width .7s ease}

/* 점 카운터 (급등) */
.dots{display:flex;gap:3px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:#e5e7eb}
.dot.on{background:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* 절감 액션 3장 */
.ai-acts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ai-act{background:var(--bg);border-radius:10px;padding:11px 10px;display:flex;flex-direction:column;gap:3px;transition:.15s;cursor:default}
.ai-act:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.ai-act-ico{font-size:26px;line-height:1;margin-bottom:4px}
.ai-act-t{font-size:11px;font-weight:900;line-height:1.2;color:var(--txt)}
.ai-act-d{font-size:10px;color:var(--txt-m);line-height:1.3}

.ai-empty{padding:30px 20px;text-align:center;color:var(--txt-l);font-size:12px;line-height:1.7}
.ai-loading{padding:30px;text-align:center;color:var(--txt-l);font-size:11px;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-loading::before{content:'';width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--elec);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 테이블 ── */
.table-area{max-height:170px;overflow:hidden}
.table-wrap{overflow:auto;max-height:130px}
.dtable{width:100%;border-collapse:collapse;font-size:11px}
.dtable thead{position:sticky;top:0;background:#f8fafc;z-index:1}
.dtable th{padding:7px 3px;font-size:9px;font-weight:700;color:var(--txt-l);text-align:center;background:#f8fafc;border-bottom:1px solid var(--border)}
.dtable th:first-child{text-align:left;padding-left:14px}
.dtable td{padding:0;text-align:center;border-bottom:1px solid #f1f5f9;height:30px}
.dtable .rl{font-size:10.5px;font-weight:700;color:var(--txt-m);text-align:left;padding:0 14px;white-space:nowrap;background:#fafbfc}
.dtable input{width:100%;height:100%;border:none;text-align:center;font-size:11px;font-family:inherit;background:transparent;outline:none;color:var(--txt);padding:0 3px}
.dtable input:focus{background:#eff6ff;font-weight:700}
.dtable input[type=number]::-webkit-outer-spin-button,.dtable input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.dtable .tot{font-weight:900;padding:0 10px;background:#fafbfc;text-align:right;font-size:10px}
.dtable .budget-row td{background:#fff}
.dtable .budget-row input{text-align:left;padding:0 12px;color:var(--elec);font-weight:700}
.upload-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1.3px dashed var(--border);background:none;color:var(--txt-m);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer}
.upload-btn:hover{border-color:var(--elec);color:var(--elec);background:var(--elec-bg)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 16px;border-radius:10px;font-size:12px;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,.2);line-height:1.5;animation:fadeUp .25s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:900px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .main-row{grid-template-columns:1fr}
  .ai-grid{grid-template-columns:1fr}
  .ai-acts{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-brand">
    <img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt="">
    <div class="divider"></div>
    <span>공과금 관리</span>
  </div>
  <div class="hdr-tabs">
    <button class="hdr-tab on" data-t="전기" onclick="setTab('전기')">⚡ 전기</button>
    <button class="hdr-tab" data-t="가스" onclick="setTab('가스')">🔥 가스</button>
    <button class="hdr-tab" data-t="수도" onclick="setTab('수도')">💧 수도</button>
  </div>
  <div class="hdr-year">
    <button onclick="chgYear(-1)">‹</button>
    <span class="yr" id="yLabel">2025년</span>
    <button onclick="chgYear(1)">›</button>
  </div>
</div>

<div class="wrap">

  <!-- KPI 4칸 -->
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-text">
        <div class="kpi-label">연간 누적</div>
        <div class="kpi-value" id="kv0">—</div>
        <div class="kpi-sub" id="ks0"></div>
      </div>
      <div class="kpi-viz" id="kviz0"></div>
    </div>
    <div class="kpi">
      <div class="kpi-text">
        <div class="kpi-label" id="kl1">이번달</div>
        <div class="kpi-value" id="kv1">—</div>
        <div class="kpi-sub" id="ks1"></div>
      </div>
      <div class="kpi-viz" id="kviz1"></div>
    </div>
    <div class="kpi">
      <div class="kpi-text">
        <div class="kpi-label">전년 대비</div>
        <div class="kpi-value" id="kv2">—</div>
        <div class="kpi-sub" id="ks2"></div>
      </div>
      <div class="kpi-viz" id="kviz2"></div>
    </div>
    <div class="kpi">
      <div class="kpi-text">
        <div class="kpi-label">예산 집행</div>
        <div class="kpi-value" id="kv3">—</div>
        <div class="kpi-sub" id="ks3"></div>
      </div>
      <div class="kpi-viz" id="kviz3"></div>
    </div>
  </div>

  <!-- 메인: 차트 + 사이드 -->
  <div class="main-row">

    <div class="card chart-card">
      <div class="card-head">
        <h3 id="chartTitle">📊 연간 사용량 · 기온 추이</h3>
        <div class="chart-legends" id="chartLegends"></div>
      </div>
      <div class="chart-box"><canvas id="chartMain"></canvas></div>
    </div>

    <div class="side-col">
      <!-- 날씨 -->
      <div class="card">
        <div class="card-head"><h3>🌤️ 오늘의 날씨</h3></div>
        <div class="card-body" id="weatherContent"></div>
      </div>

      <!-- 월상세 -->
      <div class="card">
        <div class="card-head">
          <h3>📍 월별 상세</h3>
          <div class="focus-nav-inline">
            <button onclick="chgFocus(-1)">‹</button>
            <span class="focus-month" id="focusLabel">—월</span>
            <button onclick="chgFocus(1)">›</button>
          </div>
        </div>
        <div class="card-body"><div class="mm-list" id="focusKV"></div></div>
      </div>
    </div>
  </div>

  <!-- AI -->
  <div class="card ai-card">
    <div class="card-head">
      <h3>🤖 AI 분석 · 절감 조언</h3>
      <span class="tag" id="aiTag">자동</span>
    </div>
    <div class="ai-body" id="aiContent">
      <div class="ai-loading">AI 분석 중</div>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="card table-area">
    <div class="card-head">
      <h3>📋 <span id="tableTitle">전기</span> · <span id="tableYear">2025</span>년 월별 입력</h3>
      <div style="display:flex;align-items:center;gap:8px">
        <label class="upload-btn" for="fileIn">📷 고지서 업로드</label>
        <input type="file" id="fileIn" accept="image/*,.pdf" multiple onchange="handleUpload(this.files)" style="display:none">
        <span id="uploadStatus" style="font-size:10px;color:var(--txt-l)"></span>
      </div>
    </div>
    <div class="table-wrap"><table class="dtable" id="dataTable"></table></div>
  </div>

</div>

<script>
var WORKER='https://bill-worker.hdh1231.workers.dev';
var Y=new Date().getFullYear(),T='전기',FM=0;
var charts={};
var $=id=>document.getElementById(id);
var UNITS={'전기':'kWh','가스':'m³','수도':'m³'};
var C={'전기':{main:'#2563eb',bg:'#eff6ff',icon:'⚡'},'가스':{main:'#ea580c',bg:'#fff7ed',icon:'🔥'},'수도':{main:'#0891b2',bg:'#ecfeff',icon:'💧'}};
var D={'전기':{budget:{}},'가스':{budget:{}},'수도':{budget:{}}};
var W={},CURRENT_W=null,NORMALS=null;

// ─── 샘플 데이터 ───
(function(){
  var eU24=[12400,11800,9600,7200,6800,8900,14200,15600,11200,7800,8400,11600];
  var eU25=[13100,12200,9900,7500,7100,9400,14800,16100,11600,8100,8700,12000];
  var eR24=[160,160,140,138,138,155,175,185,158,142,148,158];
  var eR25=[162,162,142,140,140,158,178,188,160,145,150,160];
  var eB24=[40,40,45,45,45,50,60,60,50,45,45,50];

function fnum(n){return n?Number(n).toLocaleString():'-'}

function autoFM(){var d=D[T][Y]||{},last=0;for(var m=1;m<=12;m++)if(d[m]&&(d[m].u||d[m].a))last=m;return last||Math.max(1,new Date().getMonth())}
function predict(mo){var p=D[T][Y-1]||{},p2=D[T][Y-2]||{},lm=p[mo];if(!lm)return null;var u=lm.u||0,a=lm.a||0;var pm=p2[mo];if(pm&&pm.a>0){var gr=(lm.a-pm.a)/pm.a;a=Math.round(a*(1+gr));if(pm.u>0)u=Math.round(u*(1+(lm.u-pm.u)/pm.u));}return{u,a}}

// SVG 스파크라인
function sparkSVG(values,color,w,h){
  var vs=values.filter(v=>v!=null);
  if(!vs.length)return '';
  var max=Math.max(...vs),min=Math.min(0,Math.min(...vs));
  var step=w/(values.length-1);
  var pts=values.map((v,i)=>{
    var y=v==null?h:h-((v-min)/(max-min||1))*(h-2)-1;
    return (i*step).toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" preserveAspectRatio="none">'
    +'<polygon points="0,'+h+' '+pts+' '+w+','+h+'" fill="'+color+'" opacity="0.18"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

// ─── KPI (시각화) ───
function renderKPI(){
  var data=D[T][Y]||{},prev=D[T][Y-1]||{},budget=D[T].budget[Y]||0,c=C[T];

  // 월별 누적 (연간 누적용)
  var cumA=[],running=0;
  for(var m=1;m<=12;m++){var dd=data[m];if(dd&&dd.a){running+=dd.a;cumA.push(running);}else{var pr=predict(m);if(pr)running+=pr.a;cumA.push(running);}}
  var totalA=cumA[11]||0;
  var prevA=0,cnt=0;
  for(m=1;m<=12;m++){if(data[m]){cnt++;}if(prev[m]&&m<=cnt)prevA+=prev[m].a||0;}
  var actualTotal=0;for(m=1;m<=12;m++)if(data[m])actualTotal+=data[m].a||0;

  // KPI 1: 연간 누적 + 스파크라인
  $('kv0').textContent=won(actualTotal);
  $('ks0').textContent=cnt+'개월 입력 · 예측치 '+won(totalA);
  $('kviz0').innerHTML=sparkSVG(cumA,c.main,82,44);

  // KPI 2: 이번달 + 쌍막대
  var d=data[FM],p=prev[FM],pred=d?null:predict(FM);
  var mAmt=d?(d.a||0):(pred?pred.a:0);
  var pAmt=p?p.a:0;
  var yoyM=pAmt?Math.round((mAmt-pAmt)/pAmt*100):null;
  $('kl1').textContent=FM+'월 요금';
  $('kv1').textContent=won(mAmt);
  $('ks1').textContent=pAmt?'작년 '+won(pAmt):'비교 데이터 없음';
  var maxPair=Math.max(mAmt,pAmt,1);
  var hPrev=Math.round((pAmt/maxPair)*46);
  var hCurr=Math.round((mAmt/maxPair)*46);
  $('kviz1').innerHTML='<div class="pair">'
    +'<div class="pair-col"><div class="pair-bar prev" style="height:'+hPrev+'px"></div></div>'
    +'<div class="pair-col"><div class="pair-bar curr" style="height:'+hCurr+'px;background:'+c.main+'"></div></div>'
    +'<span class="pair-tag prev">작년</span><span class="pair-tag curr">'+Y+'</span>'
    +'</div>';

  // KPI 3: 전년 대비 + 큰 화살표
  var chg=prevA>0?Math.round((actualTotal-prevA)/prevA*100):null;
  if(chg!=null){
    $('kv2').style.color=chg>0?'var(--red)':chg<0?'var(--green)':'var(--txt)';
    $('kv2').textContent=(chg>0?'+':'')+chg+'%';
    $('ks2').textContent=won(prevA)+' → '+won(actualTotal);
    var dir=chg>2?'up':chg<-2?'down':'flat';
    var arrow=chg>2?'↑':chg<-2?'↓':'→';
    $('kviz2').innerHTML='<div class="big-arrow '+dir+'"><div class="big-arrow-ico">'+arrow+'</div><div class="big-arrow-pct">'+Math.abs(chg)+'%</div></div>';
  }else{$('kv2').textContent='—';$('ks2').textContent='';$('kviz2').innerHTML='';}

  // KPI 4: 예산 + 도넛
  var bpct=budget?Math.round(totalA/budget*100):null;
  if(bpct!=null){
    var bColor=bpct>100?'var(--red)':bpct>90?'var(--amber)':'var(--green)';
    var ring=bpct>100?'#dc2626':bpct>90?'#d97706':'#16a34a';
    var emo=bpct>100?'🚨':bpct>90?'⚠️':'✅';
    $('kv3').style.color=bColor;
    $('kv3').textContent=bpct+'%';
    $('ks3').textContent=won(totalA)+' / '+won(budget);
    $('kviz3').innerHTML='<div class="donut" style="--pct:'+Math.min(100,bpct)+';--ring:'+ring+'"><div class="donut-inner"><span class="emo">'+emo+'</span></div></div>';
  }else{$('kv3').textContent='미설정';$('ks3').textContent='하단 표에서 입력';$('kviz3').innerHTML='<div class="donut" style="--pct:0;--ring:#94a3b8"><div class="donut-inner"><span class="emo">🎯</span></div></div>';}
}

  function tc(a,b){if(a==null||b==null)return'norm';return a-b>1?'hot':a-b<-1?'cold':'norm'}
  function dt(a,b){if(a==null||b==null)return'-';var d=Math.round((a-b)*10)/10;return(d>0?'+':'')+d+'°'}

    +'<div class="w-compare">'
    +'<div class="w-compare-chip"><div class="w-compare-lbl">예년</div><div class="w-compare-val '+tc(t,norm)+'">'+dt(t,norm)+'</div></div>'

// ─── 월 상세 (미니바 시각화) ───
function renderFocus(){
  $('focusLabel').textContent=FM+'월';
  var data=D[T][Y]||{},prev=D[T][Y-1]||{},c=C[T];
  var d=data[FM],p=prev[FM],pred=d?null:predict(FM);
  var amt=d?(d.a||0):(pred?pred.a:0);
  var use=d?(d.u||0):(pred?pred.u:0);
  var pa=p?p.a:0,pu=p?p.u:0;
  var unitA=use>0?Math.round(amt/use):0;
  var pUnit=pu>0?Math.round(pa/pu):0;
  var temp=(W[Y]||{})[FM]?W[Y][FM].avg:null;
  var prevT=(W[Y-1]||{})[FM]?W[Y-1][FM].avg:null;

  var maxA=0,maxU=0,maxUnit=0;
  for(var m=1;m<=12;m++){
    var dm=data[m],pm=prev[m];
    if(dm&&dm.a){maxA=Math.max(maxA,dm.a);if(dm.u)maxUnit=Math.max(maxUnit,dm.a/dm.u);}
    if(dm&&dm.u)maxU=Math.max(maxU,dm.u);
    if(pm&&pm.a){maxA=Math.max(maxA,pm.a);if(pm.u)maxUnit=Math.max(maxUnit,pm.a/pm.u);}
    if(pm&&pm.u)maxU=Math.max(maxU,pm.u);
  }

  function delta(cur,p){if(!p||!cur)return'';var v=Math.round((cur-p)/p*100);if(Math.abs(v)<1)return'';return '<span class="mm-delta" style="color:'+(v>0?'var(--red)':'var(--green)')+'">'+(v>0?'↑':'↓')+Math.abs(v)+'%</span>';}
  function bar(label,cur,prevV,max,color,fmt){
    var curP=max?Math.max(1,Math.min(100,cur/max*100)):0;
    var prevP=max&&prevV?Math.max(0,Math.min(100,prevV/max*100)):null;
    return '<div class="mm-row">'
      +'<span class="mm-label">'+label+'</span>'
      +'<div class="mm-bar"><div class="mm-bar-fill" style="width:'+curP+'%;background:'+color+'"></div>'
      +(prevP!=null?'<div class="mm-bar-prev" style="left:'+prevP+'%"></div>':'')
      +'</div>'
      +'<span class="mm-val">'+fmt(cur)+'</span>'
      +delta(cur,prevV)
      +'</div>';
  }

  var h='';
  h+=bar('요금',amt,pa,maxA,c.main,won);
  h+=bar('사용',use,pu,maxU,c.main,v=>fnum(v));
  h+=bar('단가',unitA,pUnit,maxUnit,c.main,v=>fnum(v)+'원');
  if(temp!=null){
    var tMax=35,tShow=Math.max(0,temp);
    var pShow=prevT!=null?Math.max(0,prevT):null;
    h+=bar('기온',tShow,pShow,tMax,'#ef4444',v=>v+'°C');
  }
  $('focusKV').innerHTML=h;
}

  var peakMonth=0,peakVal=0;
  actualArr.forEach(x=>{if(x.a>peakVal){peakVal=x.a;peakMonth=x.month;}});
  var spikeMonths={};
  for(var i=1;i<actualArr.length;i++){var cur=actualArr[i],pr=actualArr[i-1];if(pr.a>0){var dd=(cur.a-pr.a)/pr.a;if(dd>=0.2)spikeMonths[cur.month]=Math.round(dd*100);}}

  for(m=1;m<=12;m++){
    var dm=data[m];
    if(dm&&(dm.u||dm.a)){
      uA.push(dm.u||0);uP.push(null);

      else if(spikeMonths[m])barColors.push('#f59e0b');

      scales:{
        y:{position:'left',beginAtZero:true,title:{display:true,text:UNITS[T],font:{size:10,weight:'600'},color:c.main},ticks:{font:{size:10},color:'#64748b',maxTicksLimit:6},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},
        y1:{position:'right',title:{display:true,text:'°C',font:{size:10,weight:'600'},color:'#ef4444'},ticks:{font:{size:10},color:'#ef4444',maxTicksLimit:6},grid:{drawOnChartArea:false},border:{display:false}},
        x:{ticks:{font:{size:10}},grid:{display:false}}
      }
    }
  });
}

// ─── AI (그림으로 말하기) ───
var aiTimer=null;
function renderAI(){if(aiTimer)clearTimeout(aiTimer);aiTimer=setTimeout(doAI,350);}
async function doAI(){
  var data=D[T][Y]||{},arr=[];
  for(var m=1;m<=12;m++)if(data[m])arr.push({month:m,u:data[m].u,a:data[m].a});
  var el=$('aiContent');
  if(!arr.length){el.innerHTML='<div class="ai-empty">📝 데이터를 입력하면 AI가 자동 분석합니다</div>';return;}
  el.innerHTML='<div class="ai-loading">AI 분석 중</div>';
  try{
    var wa=[];for(var m=1;m<=12;m++)if((W[Y]||{})[m])wa.push({month:m,avg_temp:W[Y][m].avg});
    var r=await fetch(WORKER+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({billType:T,bills:arr.map(b=>({year:Y,...b,usage_amount:b.u,bill_amount:b.a})),weather:wa,budget:D[T].budget[Y]||0,year:Y}),signal:AbortSignal.timeout(8000)});
    var d=await r.json();
    if(d.error){renderAIFrame(el,arr,null);$('aiTag').textContent='로컬 분석';return;}
    renderAIFrame(el,arr,d.analysis||{});$('aiTag').textContent='Worker AI';
  }catch(e){renderAIFrame(el,arr,null);$('aiTag').textContent='로컬 분석';}
}

function renderAIFrame(el,arr,a){
  var prev=D[T][Y-1]||{},c=C[T];
  var totalA=0,prevA=0;arr.forEach(b=>{totalA+=b.a||0;var pm=prev[b.month];if(pm)prevA+=pm.a||0;});
  var chg=prevA>0?Math.round((totalA-prevA)/prevA*100):0;
  var budget=D[T].budget[Y]||0,bpct=budget?Math.round(totalA/budget*100):null;
  var peak=arr.reduce((a,b)=>(b.a||0)>(a.a||0)?b:a,{a:0,month:0});

  var spikes=[];
  for(var i=1;i<arr.length;i++){var c2=arr[i],p2=arr[i-1];if(p2.a>0){var dd=Math.round((c2.a-p2.a)/p2.a*100);if(dd>=20)spikes.push({m:c2.month,pct:dd});}}

  // 상태 판정
  var level='ok';
  if(bpct>100||spikes.length>=3||chg>10)level='danger';
  else if(bpct>90||spikes.length>=1||chg>5)level='warn';
  var face=level==='ok'?'😊':level==='warn'?'😐':'😰';
  var faceText=level==='ok'?'양호':level==='warn'?'주의':'경고';
  var faceSub=level==='ok'?'예산·추세 모두 안정':level==='warn'?'지출 추이 모니터링':'즉시 절감 액션 필요';

  var summary=(a&&a.summary)?a.summary:null;
  if(!summary){
    var parts=[];
    parts.push(peak.month+'월 최고 '+won(peak.a));
    if(chg)parts.push('전년'+(chg>0?'+':'')+chg+'%');
    if(bpct!=null)parts.push('예산 '+bpct+'%'+(bpct>100?' 초과':''));
    if(spikes.length)parts.push('급등 '+spikes.length+'건');
    summary=parts.join(' · ');
  }

  var acts={
    '전기':[{i:'🌡️',t:'냉방 26°C↑',d:'1°C당 약 7% 절감'},{i:'🔌',t:'대기전력 차단',d:'미사용 콘센트 차단'},{i:'💡',t:'LED 전면 교체',d:'형광등 대비 30% 절감'}],
    '가스':[{i:'🏠',t:'난방 18~20°C',d:'1°C 낮추면 7% 절감'},{i:'🌙',t:'야간 온도 하강',d:'취침 타이머 설정'},{i:'🔧',t:'보일러 연 1회 점검',d:'청소·필터로 열효율 유지'}],
    '수도':[{i:'🔍',t:'월 1회 누수 점검',d:'계량기 30분 정지 확인'},{i:'🚿',t:'절수 샤워헤드',d:'기존比 최대 40% 절감'},{i:'🪣',t:'절수기 설치',d:'변기·수도 각 20% 절감'}]
  }[T]||[];

  // 쌍막대용
  var maxP=Math.max(totalA,prevA,1);
  var hCurr=Math.round((totalA/maxP)*28),hPrev=Math.round((prevA/maxP)*28);

  var ring=bpct>100?'#dc2626':bpct>90?'#d97706':'#16a34a';

  // 급등 dots (최대 5개 표시)
  var spikeDots='';
  var shown=Math.min(5,spikes.length);
  for(var k=0;k<5;k++)spikeDots+='<span class="dot'+(k<shown?' on':'')+'"></span>';

  var h='<div class="ai-summary"><span class="ico">💬</span><span>'+summary+'</span></div>';

  h+='<div class="ai-grid">';

  // 상태 페이스
  h+='<div class="ai-face '+level+'">'
    +'<div class="ai-face-emo">'+face+'</div>'
    +'<div class="ai-face-text">'+faceText+'</div>'
    +'<div class="ai-face-sub">'+faceSub+'</div></div>';

  // 시각 3개
  h+='<div class="ai-viz">';
  // 올해 vs 작년 쌍막대
  h+='<div class="ai-viz-item"><div class="ai-viz-ico">'
    +'<div style="display:flex;align-items:flex-end;gap:4px;height:34px">'
    +'<div style="width:10px;background:#cbd5e1;border-radius:2px 2px 0 0;height:'+hPrev+'px"></div>'
    +'<div style="width:10px;background:'+c.main+';border-radius:2px 2px 0 0;height:'+hCurr+'px"></div>'
    +'</div></div>'
    +'<div class="ai-viz-body"><div class="ai-viz-label">전년 대비</div>'
    +'<div class="ai-viz-val" style="color:'+(chg>0?'var(--red)':chg<0?'var(--green)':'var(--txt)')+'">'+(chg>0?'↑+':chg<0?'↓':'')+Math.abs(chg)+'%</div>'
    +'<div class="ai-viz-sub">'+won(prevA)+' → '+won(totalA)+'</div></div></div>';
  // 예산 진행바
  h+='<div class="ai-viz-item"><div class="ai-viz-ico"><div class="donut" style="width:34px;height:34px;--pct:'+(bpct!=null?Math.min(100,bpct):0)+';--ring:'+ring+'"><div class="donut-inner"><span style="font-size:9px">'+(bpct!=null?bpct+'%':'—')+'</span></div></div></div>'
    +'<div class="ai-viz-body"><div class="ai-viz-label">예산 집행</div>'
    +'<div class="ai-viz-val" style="color:'+ring+'">'+(bpct!=null?bpct+'%':'미설정')+'</div>'
    +'<div class="progress"><div class="progress-fill" style="width:'+(bpct!=null?Math.min(100,bpct):0)+'%;background:'+ring+'"></div></div></div></div>';
  // 급등 dots
  h+='<div class="ai-viz-item"><div class="ai-viz-ico"><div class="dots">'+spikeDots+'</div></div>'
    +'<div class="ai-viz-body"><div class="ai-viz-label">급등 구간</div>'
    +'<div class="ai-viz-val" style="color:'+(spikes.length?'var(--red)':'var(--green)')+'">'+spikes.length+'건</div>'
    +'<div class="ai-viz-sub">'+(spikes.length?'+20% 이상 ·'+spikes.slice(0,2).map(s=>s.m+'월').join(', '):'안정적 추이')+'</div></div></div>';
  h+='</div>';

  // 절감 액션
  h+='<div class="ai-acts">';
  acts.forEach(x=>{h+='<div class="ai-act"><span class="ai-act-ico">'+x.i+'</span><div class="ai-act-t">'+x.t+'</div><div class="ai-act-d">'+x.d+'</div></div>';});
  h+='</div>';

  h+='</div>';

  el.innerHTML=h;
}

// ─── 테이블 ───
function renderTable(){
  var data=D[T][Y]||{},unit=UNITS[T],budget=D[T].budget[Y]||'';
  var h='<thead><tr><th></th>';for(var m=1;m<=12;m++)h+='<th>'+m+'</th>';h+='<th>합계</th></tr></thead><tbody>';
  var tU=0;h+='<tr><td class="rl">사용('+unit+')</td>';for(m=1;m<=12;m++){var v=data[m]?data[m].u:'';if(v)tU+=v;h+='<td><input type="number" value="'+(v||'')+'" placeholder="—" onchange="setVal('+m+',\'u\',this.value)"></td>';}h+='<td class="tot">'+fnum(tU)+'</td></tr>';
  var tA=0;h+='<tr><td class="rl">요금(원)</td>';for(m=1;m<=12;m++){var v2=data[m]?data[m].a:'';if(v2)tA+=v2;h+='<td><input type="number" value="'+(v2||'')+'" placeholder="—" onchange="setVal('+m+',\'a\',this.value)"></td>';}h+='<td class="tot">'+won(tA)+'</td></tr>';
  h+='<tr class="budget-row"><td class="rl" style="color:var(--elec)">예산</td><td colspan="12"><input type="number" value="'+(budget||'')+'" placeholder="연간 예산 (원)" onchange="setBudget(this.value)"></td><td class="tot" style="color:var(--elec)">'+(budget?won(budget):'—')+'</td></tr></tbody>';
  $('dataTable').innerHTML=h;
}

// OCR
async function handleUpload(files){if(!files||!files.length)return;var st=$('uploadStatus');st.textContent='분석 중…';var results=[],total=0;for(var i=0;i<files.length;i++){var file=files[i],images=[];try{if(file.type==='application/pdf'){images=await pdfToImages(file);}else{var du=await readFile(file);images=[du.split(',')[1]];}for(var j=0;j<images.length;j++){total++;st.textContent='OCR '+total+'번째…';var result=await ocrImage(images[j]);if(result)results.push(result);}}catch(e){}}if(!results.length){st.textContent='인식 실패';}else{var msgs=[];results.forEach(async r=>{var type=r.bill_type||T,yr=r.year,mo=r.month;if(!yr||!mo)return;if(!D[type])D[type]={budget:{}};if(!D[type][yr])D[type][yr]={};if(!D[type][yr][mo])D[type][yr][mo]={u:0,a:0};if(r.usage_amount)D[type][yr][mo].u=r.usage_amount;if(r.bill_amount)D[type][yr][mo].a=r.bill_amount;await saveB(type,yr,mo,D[type][yr][mo].u,D[type][yr][mo].a);msgs.push(type+' '+yr+'/'+mo+'월 '+won(r.bill_amount||0));});st.textContent=results.length+'건 완료!';showToast(msgs);if(results[0].month)FM=results[0].month;}render();$('fileIn').value='';setTimeout(()=>st.textContent='',5000);}
async function pdfToImages(file){if(!window.pdfjsLib)throw new Error('PDF 미지원');var ab=await file.arrayBuffer(),pdf=await pdfjsLib.getDocument({data:ab}).promise,imgs=[];for(var p=1;p<=Math.min(pdf.numPages,6);p++){var pg=await pdf.getPage(p),vp=pg.getViewport({scale:2}),cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;imgs.push(cv.toDataURL('image/jpeg',.85).split(',')[1]);}return imgs;}
async function ocrImage(b64){try{var r=await fetch(WORKER+'/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});var d=await r.json();return(d.ocr&&(d.ocr.year||d.ocr.bill_amount))?d.ocr:null;}catch(e){return null;}}
function readFile(f){return new Promise(ok=>{var r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(f);})}
function showToast(msgs){document.querySelector('.toast')?.remove();if(!msgs.length)return;var d=document.createElement('div');d.className='toast';d.innerHTML='<b>✅ 인식 완료</b><br>'+msgs.join('<br>');document.body.appendChild(d);setTimeout(()=>d.remove(),6000);}

render();
</script>
