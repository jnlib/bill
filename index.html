<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공과금 관리 — 종로도서관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0a1929;
  --elec:#1976d2;--elec-l:#bbdefb;--elec-bg:#e3f2fd;
  --gas:#ef6c00;--gas-l:#ffe0b2;--gas-bg:#fff3e0;
  --water:#00897b;--water-l:#b2dfdb;--water-bg:#e0f2f1;
  --bg:#f0f2f5;--surface:#fff;
  --txt:#1a2a3a;--txt-m:#5a6a7a;--txt-l:#94a4b4;
  --border:#e0e4ea;--shadow:0 2px 8px rgba(0,0,0,.05);
  --green:#2e7d32;--red:#c62828;--yellow:#f9a825;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt)}

.hdr{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:12px;color:#fff}
.hdr-left img{height:22px;filter:brightness(10)}
.hdr-title{font-size:18px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-right button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px}
.hdr-right button:hover{background:rgba(255,255,255,.2)}
.hdr-right span{color:#fff;font-size:16px;font-weight:700;min-width:56px;text-align:center}

.wrap{max-width:1100px;margin:0 auto;padding:16px}

/* ── 탭 ── */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:.15s;border:2px solid transparent;background:var(--surface)}
.tab:hover{transform:translateY(-1px)}
.tab[data-t="전기"]{color:var(--elec)}.tab[data-t="전기"].on{background:var(--elec-bg);border-color:var(--elec)}
.tab[data-t="가스"]{color:var(--gas)}.tab[data-t="가스"].on{background:var(--gas-bg);border-color:var(--gas)}
.tab[data-t="수도"]{color:var(--water)}.tab[data-t="수도"].on{background:var(--water-bg);border-color:var(--water)}

/* ── 요약 카드 ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.s-card{background:var(--surface);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.s-label{font-size:12px;color:var(--txt-l);font-weight:500;margin-bottom:6px}
.s-value{font-size:22px;font-weight:900}
.s-sub{font-size:11px;margin-top:4px}
.s-up{color:var(--red)}.s-down{color:var(--green)}.s-neutral{color:var(--txt-l)}

/* ── 메인 그리드 ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border-radius:10px;padding:20px;box-shadow:var(--shadow)}
.card-full{grid-column:1/-1}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* ── 데이터 테이블 (직접 편집) ── */
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{padding:8px 4px;font-size:11px;font-weight:600;color:var(--txt-l);text-align:center;border-bottom:2px solid var(--border);background:var(--bg)}
.dtable td{padding:0;text-align:center;border-bottom:1px solid #f0f0f0;height:36px}
.dtable .rlabel{font-size:11px;font-weight:700;color:var(--txt-m);background:var(--bg);text-align:left;padding:8px 8px;white-space:nowrap}
.dtable input{width:100%;height:100%;border:none;text-align:right;font-size:13px;font-family:inherit;padding:6px 8px;background:transparent;outline:none;color:var(--txt)}
.dtable input:focus{background:#e8f0fe;font-weight:700}
.dtable input::placeholder{color:var(--txt-l);font-style:italic}
.dtable .total-cell{font-weight:900;padding:8px 8px;background:var(--bg);text-align:right}
.dtable .budget-row input{color:var(--elec)}
.dtable .budget-row td{background:rgba(25,118,210,.02)}

/* 예산 상태 색상 */
.budget-ok{background:var(--elec-bg) !important}
.budget-warn{background:#fff8e1 !important}
.budget-over{background:#ffebee !important}
.budget-bar{height:4px;border-radius:2px;margin-top:4px;background:var(--border)}
.budget-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── 차트 ── */
.chart-wrap{position:relative;height:220px}

/* ── AI 패널 ── */
.ai-btn{padding:10px 18px;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:pointer;font-family:inherit;transition:.15s;background:var(--navy);color:#fff}
.ai-btn:hover{opacity:.85}
.ai-result{margin-top:14px;font-size:13px;line-height:1.9;color:var(--txt-m);white-space:pre-line;background:var(--bg);border-radius:8px;padding:14px}

/* ── 업로드 ── */
.upload-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.upload-btn{padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px;border:1.5px dashed var(--border);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--txt-m);transition:.15s}
.upload-btn:hover{border-color:var(--elec);color:var(--elec);background:var(--elec-bg)}
.upload-status{font-size:12px;color:var(--txt-l)}

/* ── 히어로 배너 (날씨 + 브리핑) ── */
.hero{display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:16px}
.hero-weather{background:linear-gradient(135deg,#4a90e2,#7b68ee);border-radius:14px;padding:22px;color:#fff;box-shadow:0 4px 20px rgba(74,144,226,.25);position:relative;overflow:hidden}
.hero-weather::before{content:'';position:absolute;top:-30%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.15) 0%,transparent 70%);pointer-events:none}
.hw-emoji{font-size:56px;line-height:1;margin-bottom:4px}
.hw-temp{font-size:40px;font-weight:900;line-height:1.1}
.hw-text{font-size:14px;opacity:.92;margin-top:2px;font-weight:500}
.hw-sub{font-size:11px;opacity:.78;margin-top:2px}
.hw-divider{height:1px;background:rgba(255,255,255,.2);margin:14px 0 12px}
.hw-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.hw-row b{font-size:14px;font-weight:700}
.hw-diff{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-left:4px}
.hw-diff.hot{background:rgba(255,180,120,.3);color:#ffe9d6}
.hw-diff.cold{background:rgba(160,220,255,.3);color:#e0f2ff}
.hw-diff.normal{background:rgba(255,255,255,.18);color:#fff}

.hero-briefing{background:var(--surface);border-radius:14px;padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--elec)}
.hb-title{font-size:13px;font-weight:700;color:var(--txt-m);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hb-title span:last-child{font-size:10px;color:var(--txt-l);font-weight:500;margin-left:auto}
.hb-lead{font-size:15px;color:var(--txt);line-height:1.6;margin-bottom:12px;font-weight:500}
.hb-kv{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hb-kv-item{background:var(--bg);border-radius:8px;padding:10px 12px}
.hb-kv-label{font-size:10px;color:var(--txt-l);font-weight:600;margin-bottom:2px}
.hb-kv-value{font-size:16px;font-weight:900;color:var(--txt)}
.hb-kv-sub{font-size:10px;color:var(--txt-m);margin-top:1px}
.hb-advice{border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.hb-advice-title{font-size:11px;font-weight:700;color:var(--elec);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.hb-advice ul{list-style:none;padding:0;margin:0}
.hb-advice li{font-size:12px;color:var(--txt-m);padding:3px 0 3px 16px;position:relative;line-height:1.5}
.hb-advice li::before{content:'·';position:absolute;left:6px;font-weight:900;color:var(--elec)}
.hb-none{font-size:12px;color:var(--txt-l);font-style:italic;padding:10px 0}

@media(max-width:768px){
  .hero{grid-template-columns:1fr}
}

/* ── 예산 게이지 ── */
.gauge{margin-top:12px}
.gauge-bar{height:20px;background:var(--border);border-radius:10px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:10px;transition:width .5s}
.gauge-fill.ok{background:linear-gradient(90deg,var(--green),#66bb6a)}
.gauge-fill.warn{background:linear-gradient(90deg,var(--yellow),#fdd835)}
.gauge-fill.over{background:linear-gradient(90deg,var(--red),#ef5350)}
.gauge-label{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--txt-m)}
.gauge-bar-m{display:flex;height:28px;border-radius:8px;overflow:hidden;background:var(--border);gap:1px}
.seg{transition:all .3s;position:relative}
.seg-actual{background:var(--green);opacity:.8}
.seg-predict{background:var(--green);opacity:.25}
.seg-over{background:var(--red) !important}
.seg:hover{opacity:1;transform:scaleY(1.15)}
.gauge-months{display:flex;margin-top:2px}
.gauge-months span{text-align:center;font-size:9px;color:var(--txt-l);font-weight:500}
.ok{--ok:var(--green)}.warn{--warn:var(--yellow)}.over{--over:var(--red)}

@media(max-width:768px){
  .summary{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .dtable{font-size:11px}
  .dtable input{font-size:11px;padding:4px 3px}
  .s-value{font-size:18px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt="">
    <span class="hdr-title">공과금 관리</span>
  </div>
  <div class="hdr-right">
    <button onclick="chgYear(-1)">&lt;</button>
    <span id="yLabel">2025년</span>
    <button onclick="chgYear(1)">&gt;</button>
  </div>
</div>

<div class="wrap">

  <div class="tabs">
    <div class="tab on" data-t="전기" onclick="setTab('전기')">&#9889; 전기</div>
    <div class="tab" data-t="가스" onclick="setTab('가스')">&#128293; 가스</div>
    <div class="tab" data-t="수도" onclick="setTab('수도')">&#128167; 수도</div>
  </div>

  <!-- 히어로: 오늘 날씨 + AI 브리핑 -->
  <div class="hero">
    <div class="hero-weather" id="heroWeather">
      <div class="hw-emoji">🌡️</div>
      <div class="hw-temp">--°C</div>
      <div class="hw-text">날씨 로딩 중...</div>
      <div class="hw-sub">서울 종로구</div>
    </div>
    <div class="hero-briefing" id="heroBriefing">
      <div class="hb-title">📋 오늘의 브리핑 <span>자동 분석</span></div>
      <div class="hb-lead">데이터를 분석하고 있어요...</div>
    </div>
  </div>

  <!-- 요약 -->
  <div class="summary" id="summary"></div>

  <!-- 예산 게이지 -->
  <div class="card" id="gaugeCard" style="margin-bottom:16px">
    <div class="card-title">예산 집행 현황</div>
    <div class="gauge" id="gauge"></div>
  </div>

  <!-- 업로드 + 테이블 -->
  <div class="card card-full" style="margin-bottom:16px">
    <div class="card-title">
      <span>월별 데이터</span>
      <div class="upload-bar">
        <label class="upload-btn" for="fileIn">&#128247; 고지서 업로드</label>
        <input type="file" id="fileIn" accept="image/*,.pdf" multiple onchange="handleUpload(this.files)" style="display:none">
        <span class="upload-status" id="uploadStatus"></span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="dtable" id="dataTable"></table>
    </div>
  </div>

  <div class="grid">
    <!-- 사용량 + 기온 -->
    <div class="card">
      <div class="card-title">
        <span>사용량 · 기온 비교</span>
        <span id="corrBadge" style="font-size:11px;font-weight:500;color:var(--txt-l)"></span>
      </div>
      <div class="chart-wrap"><canvas id="chartUsage"></canvas></div>
    </div>
    <!-- 요금 추이 + 예측 -->
    <div class="card">
      <div class="card-title">
        <span>요금 추이 (예측 포함)</span>
        <span style="font-size:10px;font-weight:500;color:var(--txt-l)">━ 실측 / ┅ 예측</span>
      </div>
      <div class="chart-wrap"><canvas id="chartCost"></canvas></div>
    </div>
    <!-- AI -->
    <div class="card card-full">
      <div class="card-title">
        <span>&#129302; AI 분석</span>
        <button class="ai-btn" onclick="runAI()">분석 실행</button>
      </div>
      <div class="ai-result" id="aiResult" style="display:none"></div>
    </div>
  </div>

</div>

<script>
var WORKER = 'https://bill-worker.hdh1231.workers.dev';
var Y = new Date().getFullYear();
var T = '전기';
var charts = {};

var $ = function(id){return document.getElementById(id)};
var UNITS = {'전기':'kWh','가스':'m³','수도':'m³'};
var COLORS = {
  '전기':{main:'#1976d2',light:'#90caf9',bg:'#e3f2fd'},
  '가스':{main:'#ef6c00',light:'#ffcc80',bg:'#fff3e0'},
  '수도':{main:'#00897b',light:'#80cbc4',bg:'#e0f2f1'}
};

// 데이터 저장소
var D = {
  '전기':{2023:{},2024:{},2025:{},budget:{}},
  '가스':{2023:{},2024:{},2025:{},budget:{}},
  '수도':{2023:{},2024:{},2025:{},budget:{}}
};

// 기온 데이터 (Worker /weather에서 Open-Meteo로 가져옴)
// 형식: W[year][month] = {avg, max, min, hdd, cdd}
var W = {};
var wLoading = {}; // 중복 요청 방지

// 샘플 데이터
(function loadSample(){
  var s = {
    '전기':{
      2024:{1:{u:12400,a:1860000},2:{u:11800,a:1770000},3:{u:9600,a:1440000},4:{u:7200,a:1080000},5:{u:6800,a:1020000},6:{u:8900,a:1335000},7:{u:14200,a:2130000},8:{u:15600,a:2340000},9:{u:11200,a:1680000},10:{u:7800,a:1170000},11:{u:8400,a:1260000},12:{u:11600,a:1740000}},
      2025:{1:{u:13100,a:1965000},2:{u:12200,a:1830000},3:{u:9900,a:1485000}},
      budget:{2024:18000000,2025:19000000}
    },
    '가스':{
      2024:{1:{u:4200,a:3780000},2:{u:3800,a:3420000},3:{u:2600,a:2340000},4:{u:1200,a:1080000},5:{u:400,a:360000},6:{u:200,a:180000},7:{u:150,a:135000},8:{u:120,a:108000},9:{u:300,a:270000},10:{u:1400,a:1260000},11:{u:2800,a:2520000},12:{u:3900,a:3510000}},
      2025:{1:{u:4500,a:4050000},2:{u:4000,a:3600000},3:{u:2800,a:2520000}},
      budget:{2024:20000000,2025:21000000}
    },
    '수도':{
      2024:{1:{u:320,a:480000},2:{u:310,a:465000},3:{u:340,a:510000},4:{u:360,a:540000},5:{u:380,a:570000},6:{u:420,a:630000},7:{u:480,a:720000},8:{u:510,a:765000},9:{u:440,a:660000},10:{u:370,a:555000},11:{u:330,a:495000},12:{u:320,a:480000}},
      2025:{1:{u:330,a:495000},2:{u:320,a:480000},3:{u:350,a:525000}},
      budget:{2024:7500000,2025:8000000}
    }
  };
  for(var t in s){
    for(var y in s[t]){
      if(y==='budget'){D[t].budget=s[t].budget;continue}
      D[t][y]={};
      for(var m in s[t][y]) D[t][y][m]=s[t][y][m];
    }
  }
})();

function setTab(t){T=t;document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('on',e.dataset.t===t)});render()}
function chgYear(d){Y+=d;$('yLabel').textContent=Y+'년';render()}

// ── 날씨 데이터 로드 (Open-Meteo via Worker) ──
function loadWeather(year){
  if(W[year]) return Promise.resolve(W[year]);
  if(wLoading[year]) return wLoading[year];
  wLoading[year] = fetch(WORKER+'/weather?year='+year)
    .then(function(r){return r.json()})
    .then(function(rows){
      var map = {};
      if(Array.isArray(rows)){
        rows.forEach(function(r){
          map[r.month] = {
            avg: r.avg_temp,
            max: r.max_temp,
            min: r.min_temp,
            hdd: r.heating_degree_days,
            cdd: r.cooling_degree_days
          };
        });
      }
      W[year] = map;
      delete wLoading[year];
      return map;
    })
    .catch(function(){
      W[year] = {};
      delete wLoading[year];
      return {};
    });
  return wLoading[year];
}

// ── 현재 날씨 (오늘) ──
var CURRENT_W = null;
var curLoading = null;
function loadCurrentWeather(){
  if(CURRENT_W) return Promise.resolve(CURRENT_W);
  if(curLoading) return curLoading;
  curLoading = fetch(WORKER+'/weather/now')
    .then(function(r){return r.json()})
    .then(function(d){
      CURRENT_W = d || {};
      curLoading = null;
      renderWeatherWidget();
      return CURRENT_W;
    })
    .catch(function(){ curLoading=null; return {}; });
  return curLoading;
}

// ── 예년 월평균 (10년 평균) ──
var NORMALS = null;
var nLoading = null;
function loadNormals(){
  if(NORMALS) return Promise.resolve(NORMALS);
  if(nLoading) return nLoading;
  nLoading = fetch(WORKER+'/weather/normals')
    .then(function(r){return r.json()})
    .then(function(rows){
      var map = {};
      if(Array.isArray(rows)) rows.forEach(function(r){ map[r.month] = r; });
      NORMALS = map;
      nLoading = null;
      return NORMALS;
    })
    .catch(function(){ nLoading=null; NORMALS={}; return NORMALS; });
  return nLoading;
}

// ── 오늘 날씨 위젯 ──
function renderWeatherWidget(){
  var el = $('heroWeather');
  if(!el || !CURRENT_W || CURRENT_W.temp == null){
    return;
  }
  var now = new Date();
  var curMonth = now.getMonth()+1;
  var curY = now.getFullYear();

  // 이달 평균기온 (당해년)
  var thisMonthAvg = null;
  if(W[curY] && W[curY][curMonth]) thisMonthAvg = W[curY][curMonth].avg;

  // 예년 평균
  var normalAvg = (NORMALS && NORMALS[curMonth]) ? NORMALS[curMonth].avg_temp : null;

  var diffHtml = '';
  if(thisMonthAvg != null && normalAvg != null){
    var diff = Math.round((thisMonthAvg - normalAvg) * 10) / 10;
    var sign = diff > 0 ? '+' : '';
    var cls = Math.abs(diff) < 0.5 ? 'normal' : (diff > 0 ? 'hot' : 'cold');
    diffHtml = '<span class="hw-diff '+cls+'">예년 '+sign+diff+'°C</span>';
  }

  var thisMonthRow = '';
  if(thisMonthAvg != null){
    thisMonthRow = '<div class="hw-row"><span>'+curMonth+'월 평균기온</span><b>'+thisMonthAvg+'°C</b></div>';
  }
  var normalRow = '';
  if(normalAvg != null){
    normalRow = '<div class="hw-row"><span>예년 '+curMonth+'월 평균</span><b>'+normalAvg+'°C</b>'+diffHtml+'</div>';
  }

  el.innerHTML = '<div class="hw-emoji">'+(CURRENT_W.emoji||'🌡️')+'</div>'
    +'<div class="hw-temp">'+Math.round(CURRENT_W.temp)+'°C</div>'
    +'<div class="hw-text">'+(CURRENT_W.text||'-')+'</div>'
    +'<div class="hw-sub">서울 종로구 · 체감 '+Math.round(CURRENT_W.feels_like||CURRENT_W.temp)+'°C · 습도 '+(CURRENT_W.humidity||0)+'%</div>'
    +'<div class="hw-divider"></div>'
    +thisMonthRow
    +normalRow;
}

// ── 브리핑 생성 (룰 기반) ──
function renderBriefing(){
  var el = $('heroBriefing');
  if(!el) return;

  var now = new Date();
  var curMonth = now.getMonth()+1;
  var curY = now.getFullYear();
  var isCurYear = Y === curY;
  // 현재 관심 월: 현재 연도면 오늘 월, 과거 연도면 12월, 미래년이면 1월
  var focusMonth = isCurYear ? curMonth : (Y < curY ? 12 : 1);

  var data = D[T][Y] || {};
  var prev = D[T][Y-1] || {};

  // 이달 기온 (실측 있으면 그걸, 없으면 null)
  var thisMonthAvg = (W[Y]||{})[focusMonth] ? W[Y][focusMonth].avg : null;
  var normalAvg = (NORMALS && NORMALS[focusMonth]) ? NORMALS[focusMonth].avg_temp : null;
  var tempDiff = (thisMonthAvg != null && normalAvg != null) ? Math.round((thisMonthAvg - normalAvg) * 10) / 10 : null;

  // 이달 요금 (실측 or 예측)
  var thisBill = null, isPredicted = false;
  if(data[focusMonth] && data[focusMonth].a){
    thisBill = data[focusMonth].a;
  } else {
    var p = predictMonth(focusMonth);
    if(p) { thisBill = p.a; isPredicted = true; }
  }

  // 전년 동월
  var prevBill = prev[focusMonth] ? prev[focusMonth].a : null;
  var billDiff = (thisBill && prevBill) ? Math.round((thisBill - prevBill) / prevBill * 100) : null;

  // 리드 문장
  var lead = '';
  if(CURRENT_W && CURRENT_W.text){
    lead += '오늘 서울은 <b>'+CURRENT_W.text+' '+Math.round(CURRENT_W.temp||0)+'°C</b>';
    if(tempDiff != null){
      if(Math.abs(tempDiff) < 0.5){
        lead += ', 이달은 예년과 비슷한 편이에요.';
      } else if(tempDiff > 0){
        lead += ', 이달은 예년보다 <b style="color:#ef6c00">'+tempDiff+'°C 따뜻</b>해요.';
      } else {
        lead += ', 이달은 예년보다 <b style="color:#1976d2">'+Math.abs(tempDiff)+'°C 추운</b> 편이에요.';
      }
    } else {
      lead += '.';
    }
  } else {
    lead = '데이터를 가져오는 중이에요...';
  }

  // KV 카드들
  var kvHtml = '';
  if(thisBill != null){
    var billLabel = T+' '+focusMonth+'월 '+(isPredicted ? '예상' : '실측')+' 요금';
    var billColor = billDiff == null ? '#1a2a3a' : (billDiff > 5 ? '#c62828' : (billDiff < -5 ? '#2e7d32' : '#1a2a3a'));
    var diffText = billDiff != null ? '전년 대비 '+(billDiff>0?'+':'')+billDiff+'%' : '-';
    kvHtml += '<div class="hb-kv-item"><div class="hb-kv-label">'+billLabel+'</div><div class="hb-kv-value" style="color:'+billColor+'">'+won(thisBill)+'</div><div class="hb-kv-sub">'+diffText+'</div></div>';
  }

  // 연말 예상 총액
  var endTotal = 0;
  for(var m=1;m<=12;m++){
    if(data[m] && data[m].a) endTotal += data[m].a;
    else {
      var pp = predictMonth(m);
      if(pp) endTotal += pp.a;
    }
  }
  var budget = D[T].budget[Y] || 0;
  if(endTotal > 0){
    var pct = budget ? Math.round(endTotal/budget*100) : null;
    var pctText = pct != null ? pct+'% 집행 예상' : '예산 미설정';
    var pctColor = pct == null ? '#1a2a3a' : (pct > 100 ? '#c62828' : (pct > 90 ? '#ef6c00' : '#2e7d32'));
    kvHtml += '<div class="hb-kv-item"><div class="hb-kv-label">연말 총액 예상</div><div class="hb-kv-value" style="color:'+pctColor+'">'+won(endTotal)+'</div><div class="hb-kv-sub">'+pctText+'</div></div>';
  }

  // 행동 안내
  var advice = getAdvice(T, focusMonth, tempDiff, billDiff);
  var adviceHtml = '';
  if(advice && advice.length){
    adviceHtml = '<div class="hb-advice"><div class="hb-advice-title">💡 지금 할 일</div><ul>'
      + advice.map(function(a){return '<li>'+a+'</li>'}).join('')
      + '</ul></div>';
  }

  el.innerHTML = '<div class="hb-title">📋 오늘의 브리핑 <span>'+T+' · '+focusMonth+'월 기준</span></div>'
    +'<div class="hb-lead">'+lead+'</div>'
    +(kvHtml ? '<div class="hb-kv">'+kvHtml+'</div>' : '')
    +adviceHtml;
}

// ── 행동 안내 (종류·계절·기온편차별) ──
function getAdvice(type, month, tempDiff, billDiff){
  var isSummer = month >= 6 && month <= 9;
  var isWinter = (month >= 11 || month <= 3);
  var isSpring = month >= 4 && month <= 5;
  var isFall = month === 10;
  var tips = [];

  if(type === '전기'){
    if(isSummer){
      if(tempDiff != null && tempDiff > 1){
        tips.push('냉방 설정온도 <b>26°C 이상</b> 유지 (1°C 올릴 때마다 ~7% 절감)');
        tips.push('피크시간대 <b>14-17시</b> 고전력 기기 사용 자제');
        tips.push('야간에 창문 개방해 실내 축적열 배출');
        tips.push('사용 안 하는 사무공간·조명 OFF 점검');
      } else if(tempDiff != null && tempDiff < -1){
        tips.push('평년보다 선선해요. <b>자연 환기 위주</b>로 운영 가능');
        tips.push('냉방 가동 최소화로 절감 기회');
      } else {
        tips.push('예년 수준. 일상 절약 수칙(대기전력 차단, 조명 관리) 유지');
      }
    } else if(isWinter){
      if(tempDiff != null && tempDiff < -1){
        tips.push('전기 난방기 사용 증가 예상 — <b>시간제 가동</b>으로 제한');
        tips.push('주 난방은 가스/중앙으로, 전기는 보조로만');
      } else {
        tips.push('난방기 사용 <b>19-20°C</b> 설정');
        tips.push('해가 있을 땐 블라인드 올려 자연 채광·복사열 활용');
      }
    } else {
      tips.push('냉·난방 부하 낮은 계절. <b>기본 조명·대기전력 관리</b>에 집중');
      tips.push('환기 20분/하루, 습도 40-60% 유지');
    }
  } else if(type === '가스'){
    if(isWinter){
      if(tempDiff != null && tempDiff < -1){
        tips.push('평년보다 추워요 — 난방비 급증 위험');
        tips.push('설정온도 <b>20°C 이하</b>, 외출 시 17-18°C로 낮추기');
        tips.push('창문·문틈 외풍 차단 (문풍지, 에어캡 점검)');
        tips.push('가습기 가동으로 체감온도 UP (같은 온도도 더 따뜻하게 느낌)');
      } else if(tempDiff != null && tempDiff > 1){
        tips.push('포근해요 — 난방 <b>시간 단축</b> 가능');
        tips.push('주간 난방 OFF, 업무 시간대만 가동');
      } else {
        tips.push('난방 <b>20°C 이하</b>, 사용 안 하는 공간은 차단');
      }
    } else if(isSummer){
      tips.push('가스 사용량 자체가 적은 시즌 — <b>특이 변동 없는지 점검</b>');
      tips.push('온수기 등 상시 가동 기기 효율 확인');
    } else {
      tips.push('환절기 — 필요시에만 난방 <b>간헐 가동</b>');
    }
  } else if(type === '수도'){
    tips.push('누수 점검: 계량기 모두 잠근 상태에서 <b>회전 여부</b> 확인');
    tips.push('화장실·청소 용수 <b>세심한 관리</b>');
    if(billDiff != null && billDiff > 15){
      tips.push('⚠️ 전년 대비 사용 급증 — <b>누수 의심 시 즉시 전문가 점검</b>');
    }
  }

  if(billDiff != null && billDiff > 10 && type !== '수도'){
    tips.unshift('⚠️ 이달 예상 요금이 전년보다 크게 늘어요 — 선제적 절감 조치 권장');
  }

  return tips;
}

function render(){

  renderSummary();

  renderTable();
  renderCharts();
  // 날씨 비동기 로드 후 차트·브리핑 갱신
  Promise.all([loadWeather(Y), loadWeather(Y-1), loadNormals(), loadCurrentWeather()]).then(function(){
    renderCharts();
    renderBriefing();
  });
}

// ── 요약 카드 ──
function renderSummary(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var now=new Date();var cm=Y===now.getFullYear()?now.getMonth()+1:12;

  var totalA=0,totalU=0,prevA=0,cnt=0;
  for(var m=1;m<=12;m++){
    if(data[m]){totalA+=data[m].a||0;totalU+=data[m].u||0;cnt++}
    if(prev[m]&&m<=cnt) prevA+=prev[m].a||0;
  }
  var change=prevA>0?Math.round((totalA-prevA)/prevA*100):0;
  var avgA=cnt>0?Math.round(totalA/cnt):0;
  var budget=D[T].budget[Y]||0;
  var remain=budget-totalA;

  var col=COLORS[T].main;
  $('summary').innerHTML=
    card('누적 사용요금',won(totalA),(change>0?'+':'')+change+'% 전년비',change>0?'s-up':change<0?'s-down':'s-neutral',col)
    +card('월 평균',won(avgA),'('+cnt+'개월 기준)','s-neutral',col)
    +card('연간 예산',won(budget),budget?'잔액 '+won(remain):'미설정','s-neutral',col)
    +card('사용량 합계',fnum(totalU)+' '+UNITS[T],cnt+'개월 집계','s-neutral',col);

  function card(label,value,sub,cls,color){
    return '<div class="s-card"><div class="s-label">'+label+'</div><div class="s-value" style="color:'+color+'">'+value+'</div><div class="s-sub '+cls+'">'+sub+'</div></div>';
  }
}

// ── 예산 게이지 (월별 구간) ──
function renderGauge(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var budget=D[T].budget[Y]||0;
  if(!budget){$('gauge').innerHTML='<div style="text-align:center;color:var(--txt-l);font-size:13px;padding:8px">아래 표에서 연간 예산을 입력하세요</div>';return}

  // 월별 누적 계산
  var cumul=0,predictCumul=0;
  var segments='';
  var now=new Date();var cm=Y===now.getFullYear()?now.getMonth()+1:13;
  var monthLabels='';

  for(var m=1;m<=12;m++){
    var amt=0,isPredicted=false;
    if(data[m]){amt=data[m].a||0}
    else if(prev[m]){amt=Math.round((prev[m].a||0)*1.03);isPredicted=true}
    predictCumul+=amt;
    if(!isPredicted) cumul+=amt;

    var w=100/12;
    var cls=isPredicted?'seg-predict':'seg-actual';
    // 누적이 예산 넘으면 빨간색
    if(predictCumul>budget) cls+=' seg-over';
    segments+='<div class="seg '+cls+'" style="width:'+w+'%" title="'+m+'월: '+won(amt)+'"></div>';
    monthLabels+='<span style="width:'+w+'%">'+m+'</span>';
  }

  var pctSpent=Math.round(cumul/budget*100);
  var pctPredict=Math.round(predictCumul/budget*100);
  var statusCls=pctPredict<=85?'ok':pctPredict<=100?'warn':'over';

  $('gauge').innerHTML=
    '<div class="gauge-bar-m">'+segments+'</div>'
    +'<div class="gauge-months">'+monthLabels+'</div>'
    +'<div class="gauge-label">'
    +'<span><b style="color:var(--'+statusCls+')">'+pctSpent+'%</b> 집행 ('+won(cumul)+')</span>'
    +'<span style="color:var(--txt-l)">예상 '+pctPredict+'% ('+won(predictCumul)+')</span>'
    +'<span>예산 '+won(budget)+'</span></div>';
}

function setVal(month,field,val){
  var v=parseFloat(val)||0;
  if(!D[T][Y]) D[T][Y]={};
  if(!D[T][Y][month]) D[T][Y][month]={u:0,a:0};
  D[T][Y][month][field]=v;
  render();
}

function setBudget(val){
  D[T].budget[Y]=parseInt(val)||0;
  render();
}

// ── 예측 (월별) ──
// 전년동월 + 2년전 대비 증가율 + 기온차 보정
function predictMonth(month){
  var prev=D[T][Y-1]||{};
  var twoY=D[T][Y-2]||{};
  var lm=prev[month];
  if(!lm) return null;
  var u=lm.u||0, a=lm.a||0;
  var tm=twoY[month];
  if(tm && tm.a>0){
    var gr=(lm.a-tm.a)/tm.a;
    a=Math.round(a*(1+gr));
    if(tm.u>0){
      var ug=(lm.u-tm.u)/tm.u;
      u=Math.round(u*(1+ug));
    }
  }
  var thisW=(W[Y]||{})[month];
  var prevW=(W[Y-1]||{})[month];
  if(thisW && prevW && thisW.avg!=null && prevW.avg!=null){
    var diff=thisW.avg-prevW.avg;
    if(T==='전기'){
      if(month>=6 && month<=9) a=Math.round(a*(1+diff*0.035));
      else if(month>=11 || month<=3) a=Math.round(a*(1-diff*0.015));
    } else if(T==='가스'){
      if(month>=11 || month<=3) a=Math.round(a*(1-diff*0.045));
    }
  }
  return {u:u, a:a, predicted:true};
}

// 기온↔사용량 상관계수 (피어슨)
function correlation(){
  var data=D[T][Y]||{};
  var wd=W[Y]||{};
  var xs=[], ys=[];
  for(var m=1;m<=12;m++){
    if(data[m] && data[m].u && wd[m] && wd[m].avg!=null){
      xs.push(wd[m].avg);
      ys.push(data[m].u);
    }
  }
  if(xs.length<3) return null;
  var mx=xs.reduce(function(a,b){return a+b},0)/xs.length;
  var my=ys.reduce(function(a,b){return a+b},0)/ys.length;
  var num=0, dx=0, dy=0;
  for(var i=0;i<xs.length;i++){
    num+=(xs[i]-mx)*(ys[i]-my);
    dx+=(xs[i]-mx)*(xs[i]-mx);
    dy+=(ys[i]-my)*(ys[i]-my);
  }
  if(dx===0||dy===0) return null;
  return num/Math.sqrt(dx*dy);
}

// ── 차트 ──
function renderCharts(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var c=COLORS[T];

  if(charts.usage) charts.usage.destroy();
  if(charts.cost) charts.cost.destroy();

  // 실측 vs 예측 분리
  var uActual=[], uPredict=[], pData=[], aActual=[], aPredict=[], apData=[];
  var wData=[], wpData=[];
  var wd=W[Y]||{}; var wpd=W[Y-1]||{};
  var lastActualM=0;
  for(var m=1;m<=12;m++){
    var d=data[m];
    var isActual = d && (d.u || d.a);
    if(isActual){
      uActual.push(d.u||null);
      aActual.push(d.a||null);
      uPredict.push(null);
      aPredict.push(null);
      lastActualM=m;
    } else {
      var pred=predictMonth(m);
      uActual.push(null);
      aActual.push(null);
      uPredict.push(pred?pred.u:null);
      aPredict.push(pred?pred.a:null);
    }
    pData.push(prev[m]?prev[m].u:null);
    apData.push(prev[m]?prev[m].a:null);
    wData.push(wd[m]?wd[m].avg:null);
    wpData.push(wpd[m]?wpd[m].avg:null);
  }
  // 실측 → 예측 선 이어붙이기
  if(lastActualM>0 && lastActualM<12){
    aPredict[lastActualM-1]=aActual[lastActualM-1];
  }

  charts.usage=new Chart($('chartUsage'),{
    type:'bar',data:{labels:months,datasets:[
      {label:Y+'년 실측',data:uActual,backgroundColor:c.main+'cc',borderRadius:4,yAxisID:'y',order:2},
      {label:Y+'년 예측',data:uPredict,backgroundColor:c.main+'33',borderColor:c.main+'aa',borderWidth:1.5,borderRadius:4,yAxisID:'y',order:2},
      {label:(Y-1)+'년',data:pData,backgroundColor:c.light+'66',borderRadius:4,yAxisID:'y',order:3},
      {label:Y+'년 기온',data:wData,type:'line',borderColor:'#e53935',backgroundColor:'#e5393515',tension:.3,pointRadius:3,yAxisID:'y1',borderWidth:2,order:1},
      {label:(Y-1)+'년 기온',data:wpData,type:'line',borderColor:'#e5393555',borderDash:[4,4],tension:.3,pointRadius:2,yAxisID:'y1',borderWidth:1.5,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{size:10},boxWidth:10}},
        tooltip:{callbacks:{label:function(ctx){
          var lbl=ctx.dataset.label||'';
          var v=ctx.parsed.y;
          if(v==null) return lbl;
          if(lbl.indexOf('기온')>=0) return lbl+': '+v+'°C';
          return lbl+': '+fnum(v)+' '+UNITS[T];
        }}}
      },
      scales:{
        y:{beginAtZero:true,position:'left',title:{display:true,text:UNITS[T],font:{size:10}}},
        y1:{position:'right',title:{display:true,text:'°C',font:{size:10}},grid:{drawOnChartArea:false}}
      }
    }
  });

  charts.cost=new Chart($('chartCost'),{
    type:'line',data:{labels:months,datasets:[
      // 전년은 배경 회색 Area — 겹침 방지용
      {label:(Y-1)+'년',data:apData,borderColor:'#c0c8d0',backgroundColor:'#e8ecf0',fill:'origin',tension:.3,pointRadius:0,borderWidth:0,order:3},
      // 이번해 실측 — 진한 실선, 굵은 포인트
      {label:Y+'년 실측',data:aActual,borderColor:c.main,backgroundColor:c.main+'22',fill:false,tension:.3,pointRadius:5,pointBackgroundColor:c.main,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:3.5,order:1},
      // 이번해 예측 — 점선, 삼각 포인트
      {label:Y+'년 예측',data:aPredict,borderColor:c.main,backgroundColor:'transparent',fill:false,tension:.3,pointRadius:5,pointStyle:'triangle',pointBackgroundColor:c.main+'66',pointBorderColor:c.main,borderDash:[8,5],borderWidth:2.5,order:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{size:10},boxWidth:14,usePointStyle:true}},
        tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){
          var v=ctx.parsed.y;
          if(v==null) return null;
          return ctx.dataset.label+': '+won(v);
        }}}
      },
      scales:{y:{beginAtZero:true,ticks:{callback:function(v){return won(v)}}}}
    }
  });

  // 상관계수 뱃지
  var corr=correlation();
  var cb=$('corrBadge');
  if(cb){
    if(corr==null) cb.textContent='';
    else {
      var dir = corr>0 ? '↑양의 상관' : '↓음의 상관';
      var strength = Math.abs(corr);
      var label = strength>0.7?'강함':strength>0.4?'보통':'약함';
      var color = strength>0.7?'#c62828':strength>0.4?'#ef6c00':'#94a4b4';
      cb.innerHTML='기온↔사용량 <b style="color:'+color+'">'+dir+' '+label+'</b> (r='+corr.toFixed(2)+')';
    }
  }
}

// ── 업로드 ──
async function handleUpload(files){
  if(!files||!files.length) return;
  $('uploadStatus').textContent='분석 중...';
  for(var i=0;i<files.length;i++){
    var file=files[i];
    try{
      var dataUrl=await readFile(file);
      var base64=dataUrl.split(',')[1];
      var r=await fetch(WORKER+'/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,billType:T})});
      var d=await r.json();
      if(d.ocr&&d.ocr.year&&d.ocr.month){
        var yr=d.ocr.year,mo=d.ocr.month;
        if(!D[T][yr]) D[T][yr]={};
        if(!D[T][yr][mo]) D[T][yr][mo]={u:0,a:0};
        if(d.ocr.usage_amount) D[T][yr][mo].u=d.ocr.usage_amount;
        if(d.ocr.bill_amount) D[T][yr][mo].a=d.ocr.bill_amount;
        $('uploadStatus').textContent=(i+1)+'/'+files.length+' 완료 ('+yr+'년 '+mo+'월)';
        Y=yr;$('yLabel').textContent=Y+'년';
      } else {
        $('uploadStatus').textContent='인식 실패 — 직접 입력해주세요';
      }
    }catch(e){$('uploadStatus').textContent='오류: '+e.message}
  }
  render();
  setTimeout(function(){$('uploadStatus').textContent=''},3000);
}

function readFile(f){return new Promise(function(ok){var r=new FileReader();r.onload=function(){ok(r.result)};r.readAsDataURL(f)})}

// ── AI 분석 ──
function runAI(){
  var data=D[T][Y]||{};
  var prev=D[T][Y-1]||{};
  var budget=D[T].budget[Y]||0;
  var arr=[];for(var m=1;m<=12;m++) if(data[m]) arr.push({month:m,usage:data[m].u,amount:data[m].a});
  if(!arr.length){alert('데이터가 없습니다');return}

  var el=$('aiResult');el.style.display='block';el.textContent='AI가 분석 중...';

  // 로컬 분석
  var totalA=arr.reduce(function(s,d){return s+d.amount},0);
  var totalPrev=0;for(m=1;m<=arr.length;m++) if(prev[m]) totalPrev+=prev[m].a||0;
  var change=totalPrev>0?Math.round((totalA-totalPrev)/totalPrev*100):0;
  var maxM=arr.reduce(function(a,b){return b.amount>a.amount?b:a});
  var minM=arr.reduce(function(a,b){return b.amount<a.amount?b:a});
  var avgA=Math.round(totalA/arr.length);

  // 예측
  var predictTotal=totalA;
  var lastMonth=arr[arr.length-1].month;
  for(m=lastMonth+1;m<=12;m++){
    if(prev[m]) predictTotal+=Math.round(prev[m].a*1.03);
    else predictTotal+=avgA;
  }

  var lines=[];
  lines.push('[ '+T+' '+Y+'년 분석 결과 ]\n');
  lines.push('● 현재까지 '+arr.length+'개월 총 '+won(totalA)+' 사용');
  if(totalPrev>0) lines.push('  → 전년 동기 대비 '+(change>0?'+':'')+change+'%');
  lines.push('● 월 평균: '+won(avgA));
  lines.push('● 최고: '+maxM.month+'월 '+won(maxM.amount)+' / 최저: '+minM.month+'월 '+won(minM.amount));
  lines.push('');
  lines.push('● 연말 예상 총액: '+won(predictTotal));
  if(budget){
    var diff=budget-predictTotal;
    if(diff>0) lines.push('  → 예산 대비 '+won(diff)+' 여유 ('+Math.round(predictTotal/budget*100)+'% 사용 예상)');
    else lines.push('  → 예산 '+won(Math.abs(diff))+' 초과 예상! ('+Math.round(predictTotal/budget*100)+'%)');
  }
  lines.push('\n※ DB·날씨 API 연동 후 AI 심층 분석이 제공됩니다');

  el.textContent=lines.join('\n');
}

// ── 포맷 ──
function fnum(n){return n?Number(n).toLocaleString():'-'}
function won(n){
  if(!n&&n!==0) return '-';
  if(Math.abs(n)>=100000000) return (n/100000000).toFixed(1)+'억';
  if(Math.abs(n)>=10000) return Math.round(n/10000).toLocaleString()+'만원';
  return Number(n).toLocaleString()+'원';
}

render();
