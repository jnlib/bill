<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공과금 관리 — 종로도서관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root {
  --navy: #0f1f35;
  --elec: #2563eb; --elec-l: #bfdbfe; --elec-bg: #eff6ff;
  --gas:  #ea580c; --gas-l:  #fed7aa; --gas-bg:  #fff7ed;
  --water:#0891b2; --water-l:#a5f3fc; --water-bg:#ecfeff;
  --bg: #f1f5f9; --surface: #ffffff;
  --txt: #0f172a; --txt-m: #475569; --txt-l: #94a3b8;
  --border: #e2e8f0;
  --green: #16a34a; --red: #dc2626; --amber: #d97706;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --r: 14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Noto Sans KR', sans-serif; background:var(--bg); color:var(--txt); font-size:13px; display:flex; flex-direction:column; }

/* ── 헤더 ── */
.hdr {
  background: var(--navy);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
}
.hdr-brand { display:flex; align-items:center; gap:10px; }
.hdr-brand img { height:16px; filter:brightness(10) opacity(.9); }
.hdr-brand span { color:#fff; font-size:14px; font-weight:700; letter-spacing:-.3px; }
.hdr-brand .divider { width:1px; height:16px; background:rgba(255,255,255,.2); }

.hdr-tabs { display:flex; gap:2px; }
.hdr-tab {
  padding: 7px 16px;
  border-radius: 8px;
  color: rgba(255,255,255,.5);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  border: none;
  background: none;
  transition: all .15s;
  letter-spacing: -.2px;
}
.hdr-tab:hover { color:rgba(255,255,255,.85); background:rgba(255,255,255,.08); }
.hdr-tab.on { color:#fff; background:rgba(255,255,255,.15); }

.hdr-year { display:flex; align-items:center; gap:8px; }
.hdr-year button {
  width:28px; height:28px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  border-radius: 7px;
  cursor: pointer;
  font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition: background .15s;
}
.hdr-year button:hover { background:rgba(255,255,255,.2); }
.hdr-year .yr { color:#fff; font-size:14px; font-weight:700; min-width:52px; text-align:center; }

/* ── 메인 레이아웃 ── */
.main {
  flex: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 12px;
  padding: 14px 18px;
  overflow: hidden;
  min-height: 0;
}

/* ── KPI 행 ── */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kpi {
  background: var(--surface);
  border-radius: var(--r);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 14px;
}
.kpi-icon {
  width: 42px; height: 42px;
  border-radius: 11px;
  display: flex; align-items:center; justify-content:center;
  font-size: 20px;
  flex-shrink: 0;
}
.kpi-body { min-width: 0; flex: 1; }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--txt-l); margin-bottom: 3px; letter-spacing: .2px; }
.kpi-value { font-size: 20px; font-weight: 900; line-height: 1; color: var(--txt); letter-spacing: -.5px; }
.kpi-sub { font-size: 10px; color: var(--txt-m); margin-top: 3px; }
.kpi-badge {
  display: inline-flex; align-items:center;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 10px; font-weight: 700;
  margin-top: 3px;
}
.badge-up { background:#fef2f2; color:var(--red); }
.badge-down { background:#f0fdf4; color:var(--green); }
.badge-ok { background:#f0fdf4; color:var(--green); }
.badge-warn { background:#fffbeb; color:var(--amber); }
.badge-over { background:#fef2f2; color:var(--red); }

/* ── 중단: 차트 + 사이드 ── */
.mid { display:grid; grid-template-columns:1fr 340px; gap:10px; min-height:0; }

.card {
  background: var(--surface);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-head {
  padding: 14px 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.card-head h3 { font-size: 12px; font-weight: 700; color: var(--txt-m); letter-spacing: .3px; }
.chart-area { flex:1; position:relative; min-height:0; padding:10px 14px 12px; }

/* 사이드 패널 */
.side { display:flex; flex-direction:column; gap:10px; min-height:0; overflow:hidden; }
.side-top { display:grid; grid-template-columns:1fr 1fr; gap:10px; flex-shrink:0; }

/* 날씨 카드 */
.weather-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:14px; }
.w-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.w-emoji { font-size:32px; line-height:1; }
.w-temp-big { font-size:28px; font-weight:900; line-height:1; }
.w-desc { font-size:10px; color:var(--txt-m); margin-top:2px; }
.w-chips { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.w-chip { background:var(--bg); border-radius:8px; padding:7px; text-align:center; }
.wc-label { font-size:8px; font-weight:600; color:var(--txt-l); }
.wc-val { font-size:14px; font-weight:900; margin-top:1px; }
.wc-sub { font-size:8px; margin-top:1px; }
.hot{color:var(--red)}.cold{color:var(--elec)}.norm{color:var(--txt-m)}

/* 월 상세 카드 */
.focus-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:14px; }
.focus-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.focus-nav button { width:26px;height:26px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:13px; display:flex;align-items:center;justify-content:center; }
.focus-nav button:hover { background:var(--border); }
.focus-mo { font-size:15px; font-weight:900; }
.focus-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.fg-item { background:var(--bg); border-radius:8px; padding:8px 10px; }
.fg-label { font-size:9px; font-weight:600; color:var(--txt-l); }
.fg-value { font-size:15px; font-weight:900; margin-top:2px; line-height:1; }
.fg-sub { font-size:9px; color:var(--txt-m); margin-top:2px; }

/* AI 패널 */
.ai-card {
  background:var(--surface);
  border-radius:var(--r);
  box-shadow:var(--shadow-sm);
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.ai-body { flex:1; overflow-y:auto; padding:0 14px 14px; }
.ai-kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
.ai-kpi { border-radius:9px; padding:8px; text-align:center; }
.ai-kpi-label { font-size:8px; font-weight:600; color:var(--txt-l); }
.ai-kpi-value { font-size:17px; font-weight:900; line-height:1.1; margin-top:2px; }
.ai-kpi-sub { font-size:8px; color:var(--txt-m); margin-top:1px; }
.ai-spike { background:#fef2f2; border:1px solid #fecaca; border-radius:9px; padding:8px 10px; margin-bottom:8px; }
.ai-spike-title { font-size:10px; font-weight:700; color:var(--red); margin-bottom:4px; }
.ai-spike-row { display:flex; justify-content:space-between; font-size:11px; padding:1px 0; }
.ai-actions-label { font-size:9px; font-weight:700; color:var(--txt-l); letter-spacing:.3px; margin-bottom:5px; }
.ai-action { display:flex; align-items:center; gap:8px; background:var(--bg); border-radius:8px; padding:7px 9px; margin-bottom:5px; }
.ai-action-icon { font-size:17px; flex-shrink:0; }
.ai-action-title { font-size:11px; font-weight:700; }
.ai-action-desc { font-size:9px; color:var(--txt-m); margin-top:1px; }
.ai-loading { text-align:center; padding:20px; color:var(--txt-l); font-size:12px; }

/* 예산 게이지 */
.budget-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:6px; }
.budget-fill { height:100%; border-radius:3px; transition:width .6s; }
.budget-labels { display:flex; justify-content:space-between; font-size:9px; color:var(--txt-l); margin-top:3px; }

/* ── 하단: 데이터 테이블 ── */
.table-area {
  background:var(--surface);
  border-radius:var(--r);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  flex-shrink:0;
}
.table-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
}
.table-head h3 { font-size:12px; font-weight:700; color:var(--txt-m); }
.upload-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px;
  border-radius:7px;
  border:1.5px dashed var(--border);
  background:none;
  color:var(--txt-m);
  font-family:inherit; font-size:11px; font-weight:600;
  cursor:pointer;
  transition:all .15s;
}
.upload-btn:hover { border-color:var(--elec); color:var(--elec); background:var(--elec-bg); }
.dtable-wrap { overflow-x:auto; }
.dtable { width:100%; border-collapse:collapse; font-size:11px; }
.dtable th { padding:5px 4px; font-size:9px; font-weight:600; color:var(--txt-l); text-align:center; background:var(--bg); border-bottom:2px solid var(--border); }
.dtable td { padding:0; text-align:center; border-bottom:1px solid #f8fafc; height:26px; }
.dtable .rl { font-size:10px; font-weight:700; color:var(--txt-m); background:var(--bg); text-align:left; padding:0 10px; white-space:nowrap; }
.dtable input { width:100%; height:100%; border:none; text-align:right; font-size:11px; font-family:inherit; padding:0 5px; background:transparent; outline:none; }
.dtable input:focus { background:#eff6ff; font-weight:700; }
.dtable .tot { font-weight:900; padding:0 8px; background:var(--bg); text-align:right; font-size:10px; }

/* toast */
.toast { position:fixed; bottom:20px; right:20px; background:var(--navy); color:#fff; padding:14px 18px; border-radius:12px; font-size:12px; z-index:999; box-shadow:0 10px 40px rgba(0,0,0,.2); line-height:1.6; animation:fadeUp .3s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-brand">
    <img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt="">

  CURRENT_W={temp:t.avg,emoji:emj[cm]||'🌡️',text:txt[cm]||''};

// ── DB (Worker 연결 시 실데이터 오버라이드) ──
var loaded={};
async function loadDB(type){
  if(loaded[type])return;
  try{
    var r=await fetch(WORKER+'/load?type='+encodeURIComponent(type),{signal:AbortSignal.timeout(3000)});
    var d=await r.json();if(d.error)return;
    (d.bills||[]).forEach(b=>{if(!D[type][b.year])D[type][b.year]={};D[type][b.year][b.month]={u:+b.usage_amount||0,a:+b.bill_amount||0};});
    (d.budgets||[]).forEach(b=>{D[type].budget[b.year]=+b.amount||0;});
    loaded[type]=true;
  }catch(e){}
}
async function saveB(type,yr,mo,u,a){try{await fetch(WORKER+'/bills',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify([{bill_type:type,year:yr,month:mo,usage_amount:u||null,usage_unit:UNITS[type],bill_amount:a||null}])});}catch(e){}}
async function saveBudget(type,yr,amt){try{await fetch(WORKER+'/budgets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify([{bill_type:type,year:yr,amount:amt||0}])});}catch(e){}}

// ── 유틸 ──
function fnum(n){return n?Number(n).toLocaleString():'-'}
function won(n){if(!n&&n!==0)return'-';if(Math.abs(n)>=1e8)return(n/1e8).toFixed(1)+'억';if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString()+'만원';return Number(n).toLocaleString()+'원';}

function autoFM(){
  var d=D[T][Y]||{},last=0;
  for(var m=1;m<=12;m++)if(d[m]&&(d[m].u||d[m].a))last=m;
  return last||Math.max(1,new Date().getMonth());
}
function predict(mo){
  var p=D[T][Y-1]||{},p2=D[T][Y-2]||{},lm=p[mo];if(!lm)return null;
  var u=lm.u||0,a=lm.a||0;
  var pm=p2[mo];if(pm&&pm.a>0){var gr=(lm.a-pm.a)/pm.a;a=Math.round(a*(1+gr));if(pm.u>0)u=Math.round(u*(1+(lm.u-pm.u)/pm.u));}
  return{u,a};
}

// ── 이벤트 ──
function setTab(t){T=t;loaded[t]=false;document.querySelectorAll('.hdr-tab').forEach(e=>e.classList.toggle('on',e.dataset.t===t));FM=0;render();}
function chgYear(d){Y+=d;FM=0;render();}
function chgFocus(d){FM+=d;if(FM<1)FM=12;if(FM>12)FM=1;renderFocus();}
function setVal(mo,f,v){v=parseFloat(v)||0;if(!D[T][Y])D[T][Y]={};if(!D[T][Y][mo])D[T][Y][mo]={u:0,a:0};D[T][Y][mo][f]=v;var dd=D[T][Y][mo];saveB(T,Y,mo,dd.u,dd.a);render();}
function setBudget(v){D[T].budget[Y]=parseInt(v)||0;saveBudget(T,Y,D[T].budget[Y]);render();}

// ── KPI 행 ──
function renderKPI(){
  var data=D[T][Y]||{},prev=D[T][Y-1]||{},budget=D[T].budget[Y]||0,c=C[T];
  var totalA=0,prevA=0,cnt=0;
  for(var m=1;m<=12;m++){if(data[m]){totalA+=data[m].a||0;cnt++;}if(prev[m]&&m<=cnt)prevA+=prev[m].a||0;}
  var chg=prevA>0?Math.round((totalA-prevA)/prevA*100):null;
  var d=data[FM],p=prev[FM],pred=d?null:predict(FM);
  var mAmt=d?(d.a||0):(pred?pred.a:0);
  var yoyM=p&&p.a?Math.round((mAmt-p.a)/p.a*100):null;
  var predTotal=0;
  for(m=1;m<=12;m++){var dd=data[m];if(dd&&dd.a)predTotal+=dd.a;else{var pr=predict(m);if(pr)predTotal+=pr.a;}}
  var bpct=budget?Math.round(predTotal/budget*100):null;

  $('kv0').textContent=won(totalA);
  $('ks0').textContent=cnt+'개월 입력';

  $('kl1').textContent=FM+'월 요금';
  $('kv1').textContent=won(mAmt);
  $('ks1').innerHTML=yoyM!=null?'<span class="kpi-badge '+(yoyM>0?'badge-up':'badge-down')+'">'+(yoyM>0?'↑+':'↓')+yoyM+'% 전년비</span>':'';

  if(chg!=null){
    $('kv2').style.color=chg>0?'var(--red)':'var(--green)';
    $('kv2').textContent=(chg>0?'+':'')+chg+'%';
    $('ks2').textContent=won(prevA)+' → '+won(totalA);
  }

  if(bpct!=null){
    var bClass=bpct>100?'badge-over':bpct>90?'badge-warn':'badge-ok';
    $('kv3').style.color=bpct>100?'var(--red)':bpct>90?'var(--amber)':'var(--green)';
    $('kv3').textContent=bpct+'%';
    $('ks3').innerHTML='<span class="kpi-badge '+bClass+'">'+won(predTotal)+' / '+won(budget)+'</span>';
  } else {
    $('kv3').textContent='미설정';
    $('ks3').innerHTML='<span style="font-size:9px;color:var(--txt-l)">하단 표에서 입력</span>';
  }
}

function renderWeather(){
  var el=$('weatherContent');if(!el)return;
  var cm=new Date().getMonth()+1,cy=new Date().getFullYear();
  var t=CURRENT_W?CURRENT_W.temp:null,emj=CURRENT_W?CURRENT_W.emoji:'🌡️',txt=CURRENT_W?CURRENT_W.text:'';
  var norm=(NORMALS||{})[cm]?NORMALS[cm].avg:null;
  var prev=(W[cy-1]||{})[cm]?W[cy-1][cm].avg:null;
  function tc(a,b){if(a==null||b==null)return'norm';return a-b>1?'hot':a-b<-1?'cold':'norm';}
  function dt(a,b){if(a==null||b==null)return'';var d=Math.round((a-b)*10)/10;return(d>0?'+':'')+d+'°';}
  el.innerHTML='<div class="w-row"><span class="w-emoji">'+emj+'</span><div><div class="w-temp-big">'+(t!=null?Math.round(t)+'°C':'--')+'</div><div class="w-desc">'+txt+'</div></div></div>'
    +'<div class="w-chips">'
    +'<div class="w-chip"><div class="wc-label">예년 '+cm+'월</div><div class="wc-val">'+(norm!=null?norm+'°':'--')+'</div><div class="wc-sub '+tc(t,norm)+'">'+dt(t,norm)+'</div></div>'
    +'<div class="w-chip"><div class="wc-label">작년 '+cm+'월</div><div class="wc-val">'+(prev!=null?prev+'°':'--')+'</div><div class="wc-sub '+tc(t,prev)+'">'+dt(t,prev)+'</div></div>'
    +'</div>';
}

// ── AI 분석 ──
var aiTimer=null;
function renderAI(){if(aiTimer)clearTimeout(aiTimer);aiTimer=setTimeout(doAI,400);}
async function doAI(){
  var data=D[T][Y]||{},arr=[];
  for(var m=1;m<=12;m++)if(data[m])arr.push({month:m,u:data[m].u,a:data[m].a});
  var el=$('aiContent');if(!arr.length){el.innerHTML='<div class="ai-loading">데이터를 입력하면<br>자동으로 분석됩니다</div>';return;}
  try{
    var wa=[];for(var m=1;m<=12;m++)if((W[Y]||{})[m])wa.push({month:m,avg_temp:W[Y][m].avg});
    var r=await fetch(WORKER+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({billType:T,bills:arr.map(b=>({year:Y,...b,usage_amount:b.u,bill_amount:b.a})),weather:wa,budget:D[T].budget[Y]||0,year:Y}),signal:AbortSignal.timeout(8000)});
    var d=await r.json();
    if(d.error){localAI(el,arr);return;}
    var a=d.analysis||{},h='';
    if(a.summary)h+='<div style="font-weight:700;color:var(--txt);margin-bottom:8px;font-size:12px">'+a.summary+'</div>';
    [{k:'trend',ico:'📈'},{k:'correlation',ico:'🌡️'},{k:'anomalies',ico:'⚠️'},{k:'suggestions',ico:'💡'},{k:'forecast',ico:'🔮'}].forEach(({k,ico})=>{
      if(a[k])h+='<div style="padding:6px 9px;background:var(--bg);border-radius:8px;margin-bottom:5px;font-size:11px;line-height:1.5"><b>'+ico+'</b> '+a[k]+'</div>';
    });
    el.innerHTML=h||'<div class="ai-loading">분석 결과 없음</div>';
  }catch(e){localAI(el,arr);}
}

function localAI(el,arr){
  var prev=D[T][Y-1]||{},c=C[T];
  var totalA=0,prevA=0;arr.forEach(b=>{totalA+=b.a||0;var pm=prev[b.month];if(pm)prevA+=pm.a||0;});
  var chg=prevA>0?Math.round((totalA-prevA)/prevA*100):0;
  var budget=D[T].budget[Y]||0,bpct=budget?Math.round(totalA/budget*100):null;
  var bColor=!bpct?'var(--txt-m)':bpct>100?'var(--red)':bpct>90?'var(--amber)':'var(--green)';
  var peak=arr.reduce((a,b)=>(b.a||0)>(a.a||0)?b:a,{a:0,month:0});

  // 급등 탐지
  var spikes=[];
  for(var i=1;i<arr.length;i++){var c2=arr[i],p2=arr[i-1];if(p2.a>0){var dd=Math.round((c2.a-p2.a)/p2.a*100);if(dd>=20)spikes.push({m:c2.month,pct:dd});}}

  var acts={
    '전기':[{i:'🌡️',t:'냉방 설정 26°C 이상',d:'1°C 높일 때마다 약 7% 절감'},
             {i:'🔌',t:'대기전력 차단',d:'미사용 콘센트 차단기 설치 권장'},
             {i:'💡',t:'LED 전면 교체',d:'형광등 대비 30% 절감 효과'}],
    '가스':[{i:'🏠',t:'난방 18~20°C 유지',d:'1°C 낮추면 약 7% 절감'},
             {i:'🌙',t:'야간 온도 자동 하강',d:'취침 타이머 설정으로 무의식 절감'},
             {i:'🔧',t:'보일러 연 1회 점검',d:'청소·필터 교체로 열효율 유지'}],
    '수도':[{i:'🔍',t:'월 1회 누수 점검',d:'계량기 30분 정지 여부 확인'},
             {i:'🚿',t:'절수 샤워헤드 교체',d:'기존 대비 최대 40% 절감'},
             {i:'🪣',t:'절수기 설치',d:'변기·수도꼭지 절수기 각 20% 절감'}]
  }[T]||[];

  var h='';

  // KPI 3칸
  h+='<div class="ai-kpi-row">';
  h+='<div class="ai-kpi" style="background:'+(chg>5?'#fef2f2':chg<-5?'#f0fdf4':'var(--bg)')+'">'
    +'<div class="ai-kpi-label">전년 대비</div>'
    +'<div class="ai-kpi-value" style="color:'+(chg>0?'var(--red)':'var(--green)')+'">'+(chg>0?'↑':'↓')+Math.abs(chg)+'%</div>'
    +'<div class="ai-kpi-sub">'+(chg>0?'증가':'절감')+'</div></div>';
  h+='<div class="ai-kpi" style="background:var(--bg)">'
    +'<div class="ai-kpi-label">최고 요금</div>'
    +'<div class="ai-kpi-value" style="color:'+C[T].main+'">'+peak.month+'월</div>'
    +'<div class="ai-kpi-sub">'+won(peak.a)+'</div></div>';
  h+='<div class="ai-kpi" style="background:var(--bg)">'
    +'<div class="ai-kpi-label">예산 집행</div>'
    +'<div class="ai-kpi-value" style="color:'+bColor+'">'+(bpct!=null?bpct+'%':'—')+'</div>'
    +'<div class="ai-kpi-sub">'+(budget?won(budget):'미설정')+'</div></div>';
  h+='</div>';

  // 급등 경보
  if(spikes.length){
    h+='<div class="ai-spike"><div class="ai-spike-title">⚠️ 급등 구간 감지</div>';
    spikes.slice(0,2).forEach(s=>{h+='<div class="ai-spike-row"><span>'+(s.m-1)+'월 → '+s.m+'월</span><span style="font-weight:900;color:var(--red)">+'+s.pct+'%</span></div>';});
    h+='</div>';
  }

  // 절감 액션
  h+='<div class="ai-actions-label">지금 할 수 있는 절감 액션</div>';
  acts.forEach(a=>{
    h+='<div class="ai-action"><span class="ai-action-icon">'+a.i+'</span>'
      +'<div><div class="ai-action-title">'+a.t+'</div><div class="ai-action-desc">'+a.d+'</div></div></div>';
  });

  el.innerHTML=h;
}

}

// ── OCR ──
async function handleUpload(files){if(!files||!files.length)return;var st=$('uploadStatus');st.textContent='분석 중…';var results=[],total=0;for(var i=0;i<files.length;i++){var file=files[i],images=[];try{if(file.type==='application/pdf'){images=await pdfToImages(file);}else{var du=await readFile(file);images=[du.split(',')[1]];}for(var j=0;j<images.length;j++){total++;st.textContent='OCR '+total+'번째…';var result=await ocrImage(images[j]);if(result)results.push(result);}}catch(e){}}if(!results.length){st.textContent='인식 실패';}else{var msgs=[];results.forEach(async r=>{var type=r.bill_type||T,yr=r.year,mo=r.month;if(!yr||!mo)return;if(!D[type])D[type]={budget:{}};if(!D[type][yr])D[type][yr]={};if(!D[type][yr][mo])D[type][yr][mo]={u:0,a:0};if(r.usage_amount)D[type][yr][mo].u=r.usage_amount;if(r.bill_amount)D[type][yr][mo].a=r.bill_amount;await saveB(type,yr,mo,D[type][yr][mo].u,D[type][yr][mo].a);msgs.push(type+' '+yr+'/'+mo+'월 '+won(r.bill_amount||0));});st.textContent=results.length+'건 완료!';showToast(msgs);if(results[0].month)FM=results[0].month;}render();$('fileIn').value='';setTimeout(()=>st.textContent='',5000);}
async function pdfToImages(file){if(!window.pdfjsLib)throw new Error('PDF 미지원');var ab=await file.arrayBuffer(),pdf=await pdfjsLib.getDocument({data:ab}).promise,imgs=[];for(var p=1;p<=Math.min(pdf.numPages,6);p++){var pg=await pdf.getPage(p),vp=pg.getViewport({scale:2}),cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;imgs.push(cv.toDataURL('image/jpeg',.85).split(',')[1]);}return imgs;}
async function ocrImage(b64){try{var r=await fetch(WORKER+'/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});var d=await r.json();return(d.ocr&&(d.ocr.year||d.ocr.bill_amount))?d.ocr:null;}catch(e){return null;}}
function readFile(f){return new Promise(ok=>{var r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(f);})}
function showToast(msgs){document.querySelector('.toast')?.remove();if(!msgs.length)return;var d=document.createElement('div');d.className='toast';d.innerHTML='<b>✅ 인식 완료</b><br>'+msgs.join('<br>');document.body.appendChild(d);setTimeout(()=>d.remove(),6000);}

render();
</script>
